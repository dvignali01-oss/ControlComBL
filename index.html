<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ControlComBL PRO</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#121212;
color:white;
}

.tela{
display:none;
padding:20px;
padding-bottom:90px;
max-width:500px;
margin:auto;
}

.ativa{
display:block;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

h1,h2{
margin-top:0;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
font-size:16px;
background:#2a2a2a;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
background:#4f8cff;
color:white;
}

.menu{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#1e1e1e;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:1px solid #333;
}

.menu button{
background:none;
font-size:14px;
}

.produto{
background:#2a2a2a;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.status{
width:12px;
height:12px;
border-radius:50%;
display:inline-block;
margin-right:6px;
}

.instalado{background:#30d158;}
.pendente{background:#ffd60a;}
.nao{background:#ff453a;}

.barra{
height:16px;
background:#333;
border-radius:10px;
overflow:hidden;
}

#progresso{
height:16px;
background:#30d158;
width:0%;
}

</style>
</head>

<body>

<!-- DASHBOARD -->

<div id="dashboard" class="tela ativa">

<h2>Dashboard</h2>

<div class="card" id="stats"></div>

</div>

<!-- NOVO CLIENTE -->

<div id="novo" class="tela">

<h2>Novo Cliente</h2>

<div class="card">

<input id="nome" placeholder="Nome do cliente">

<input id="telefone" placeholder="Telefone">

</div>

<div class="card">

<h3>Produtos</h3>

<div id="listaProdutos"></div>

<select id="tipoProduto">
<option>Internet</option>
<option>TV</option>
<option>Móvel</option>
<option>Fixo</option>
</select>

<input id="quantidade" type="number" placeholder="Quantidade">

<input id="valor" type="number" placeholder="Valor unitário">

<button onclick="addProduto()">Adicionar produto</button>

</div>

<div class="card">

<select id="status">
<option value="pendente">Pendente</option>
<option value="instalado">Instalado</option>
<option value="nao">Não instalado</option>
</select>

<button onclick="salvarCliente()">Salvar cliente</button>

</div>

</div>

<!-- CLIENTES -->

<div id="clientes" class="tela">

<h2>Clientes</h2>

<input id="busca" placeholder="Buscar cliente" onkeyup="buscar()">

<div id="listaClientes"></div>

</div>

<!-- COMISSÕES -->

<div id="comissao" class="tela">

<h2>Comissões</h2>

<div class="card">

Instalações: <span id="inst"></span><br>
Comissão total: R$ <span id="totalCom"></span>

</div>

<div class="card">

Meta mensal

<div id="meta"></div>

<div class="barra">
<div id="progresso"></div>
</div>

</div>

</div>

<!-- MENU INFERIOR -->

<div class="menu">

<button onclick="abrir('dashboard')">📊</button>
<button onclick="abrir('novo')">➕</button>
<button onclick="abrir('clientes')">👥</button>
<button onclick="abrir('comissao')">💰</button>

</div>

<script>

let clientes=JSON.parse(localStorage.getItem("clientes"))||[]

let produtosTemp=[]

function salvarLocal(){

localStorage.setItem("clientes",JSON.stringify(clientes))

}

function abrir(id){

document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"))

document.getElementById(id).classList.add("ativa")

if(id==="dashboard")renderDash()

if(id==="clientes")renderClientes()

if(id==="comissao")renderComissao()

}

function addProduto(){

let tipo=tipoProduto.value
let q=parseFloat(quantidade.value)
let v=parseFloat(valor.value)

if(!q||!v)return

produtosTemp.push({

tipo:tipo,
q:q,
v:v

})

renderProdutos()

quantidade.value=""
valor.value=""

}

function renderProdutos(){

let html=""

produtosTemp.forEach(p=>{

html+=`

<div class="produto">

${p.tipo} | ${p.q} x ${p.v}

</div>

`

})

listaProdutos.innerHTML=html

}

function salvarCliente(){

clientes.push({

nome:nome.value,
telefone:telefone.value,
status:status.value,
produtos:produtosTemp

})

produtosTemp=[]

nome.value=""
telefone.value=""

renderProdutos()

salvarLocal()

alert("Cliente salvo")

}

function totalVenda(produtos){

let total=0

produtos.forEach(p=>{

total+=p.q*p.v

})

return total

}

function renderDash(){

let totalClientes=clientes.length

let instalados=clientes.filter(c=>c.status==="instalado").length

let totalVendas=0

clientes.forEach(c=>{

totalVendas+=totalVenda(c.produtos)

})

stats.innerHTML=`

Clientes: ${totalClientes}<br>

Instalações: ${instalados}<br>

Total vendido: R$ ${totalVendas.toFixed(2)}

`

}

function renderClientes(){

let html=""

clientes.forEach((c,i)=>{

let total=totalVenda(c.produtos)

html+=`

<div class="card">

<span class="status ${c.status}"></span>

<b>${c.nome}</b><br>

📞 ${c.telefone}<br>

💰 R$ ${total.toFixed(2)}

<button onclick="excluir(${i})">Excluir</button>

</div>

`

})

listaClientes.innerHTML=html

}

function excluir(i){

clientes.splice(i,1)

salvarLocal()

renderClientes()

}

function buscar(){

let termo=busca.value.toLowerCase()

let filtrados=clientes.filter(c=>

c.nome.toLowerCase().includes(termo)

)

let html=""

filtrados.forEach(c=>{

html+=`<div class="card">${c.nome}</div>`

})

listaClientes.innerHTML=html

}

function renderComissao(){

let instaladas=clientes.filter(c=>c.status==="instalado")

let qtd=instaladas.length

inst.innerText=qtd

let total=0

instaladas.forEach(c=>{

let venda=totalVenda(c.produtos)

total+=venda*0.05

})

totalCom.innerText=total.toFixed(2)

let metaValor=15

meta.innerText=qtd+" / "+metaValor

progresso.style.width=(qtd/metaValor*100)+"%"

}

renderDash()

</script>

</body>
</html>

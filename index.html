<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ControlComBL</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

.tela{
display:none;
padding:20px;
padding-bottom:100px;
max-width:500px;
margin:auto;
animation:fade .4s;
}

.ativa{display:block;}

@keyframes fade{
from{opacity:0; transform:translateY(10px)}
to{opacity:1}
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:20px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
background:linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
}

.menu{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#020617;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid #1e293b;
}

.menu button{
background:none;
font-size:20px;
}

.produto{
background:#1e293b;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.status{
width:12px;
height:12px;
border-radius:50%;
display:inline-block;
margin-right:6px;
}

.instalado{background:#22c55e;}
.pendente{background:#eab308;}
.nao{background:#ef4444;}

.barra{
height:16px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

#progresso{
height:16px;
background:#22c55e;
width:0%;
}

</style>
</head>

<body>

<div id="inicio" class="tela ativa">
<h1>ControlComBL</h1>
<div class="card">
<p>Sistema de controle de vendas</p>
<button onclick="abrir('dashboard')">Iniciar</button>
</div>
</div>

<div id="dashboard" class="tela">
<h2>Dashboard</h2>
<div class="card" id="stats"></div>
</div>

<div id="novo" class="tela">

<h2>Novo Cliente</h2>

<div class="card">
<input id="nome" placeholder="Nome do cliente">
<input id="telefone" placeholder="Telefone">
</div>

<div class="card">

<h3>Produtos</h3>

<div id="listaProdutos"></div>

<select id="tipoProduto">
<option>Internet</option>
<option>TV</option>
<option>Móvel</option>
<option>Fixo</option>
</select>

<input id="quantidade" type="number" placeholder="Quantidade">
<input id="valor" type="number" placeholder="Valor unitário">

<button onclick="addProduto()">Adicionar produto</button>

</div>

<div class="card">

<select id="status">
<option value="pendente">Pendente</option>
<option value="instalado">Instalado</option>
<option value="nao">Não instalado</option>
</select>

<button onclick="salvarCliente()">Salvar cliente</button>

</div>

</div>

<div id="clientes" class="tela">

<h2>Clientes</h2>

<input id="busca" placeholder="Buscar cliente">

<div id="listaClientes"></div>

</div>

<div id="comissao" class="tela">

<h2>Comissões</h2>

<div class="card">
Instalações: <span id="inst"></span><br>
Comissão total: R$ <span id="totalCom"></span>
</div>

<div class="card">

Meta mensal

<div id="meta"></div>

<div class="barra">
<div id="progresso"></div>
</div>

</div>

</div>

<div class="menu">
<button onclick="abrir('dashboard')">📊</button>
<button onclick="abrir('novo')">➕</button>
<button onclick="abrir('clientes')">👥</button>
<button onclick="abrir('comissao')">💰</button>
</div>

<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || []
let produtosTemp = []

function salvarLocal(){
localStorage.setItem("clientes",JSON.stringify(clientes))
}

function abrir(id){

document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"))
document.getElementById(id).classList.add("ativa")

if(id==="dashboard")renderDash()
if(id==="clientes")renderClientes()
if(id==="comissao")renderComissao()

}

function addProduto(){

let tipo=document.getElementById("tipoProduto").value
let q=parseFloat(document.getElementById("quantidade").value)
let v=parseFloat(document.getElementById("valor").value)

if(!q||!v){
alert("Preencha quantidade e valor")
return
}

produtosTemp.push({tipo,q,v})

renderProdutos()

document.getElementById("quantidade").value=""
document.getElementById("valor").value=""

}

function renderProdutos(){

let html=""

produtosTemp.forEach(p=>{
html+=`<div class="produto">${p.tipo} | ${p.q} x R$ ${p.v}</div>`
})

document.getElementById("listaProdutos").innerHTML=html

}

function salvarCliente(){

let nome=document.getElementById("nome").value
let telefone=document.getElementById("telefone").value
let status=document.getElementById("status").value

if(!nome){
alert("Digite o nome")
return
}

clientes.push({
id:Date.now(),
nome,
telefone,
status,
produtos:[...produtosTemp]
})

produtosTemp=[]

document.getElementById("nome").value=""
document.getElementById("telefone").value=""

renderProdutos()

salvarLocal()

renderDash()

alert("Cliente salvo")

}

function totalVenda(produtos){

let total=0

produtos.forEach(p=>{
total+=p.q*p.v
})

return total

}

function renderDash(){

let totalClientes=clientes.length
let instalados=clientes.filter(c=>c.status==="instalado").length

let totalVendas=0

clientes.forEach(c=>{
totalVendas+=totalVenda(c.produtos)
})

document.getElementById("stats").innerHTML=`

Clientes cadastrados: ${totalClientes}<br>
Instalações: ${instalados}<br>
Total vendido: R$ ${totalVendas.toFixed(2)}

`

}

function renderClientes(lista=clientes){

let html=""

lista.forEach((c)=>{

let total=totalVenda(c.produtos)

html+=`

<div class="card">

<span class="status ${c.status}"></span>

<b>${c.nome}</b><br>

📞 ${c.telefone}<br>

💰 R$ ${total.toFixed(2)}

<button onclick="excluir(${c.id})">Excluir</button>

</div>

`

})

document.getElementById("listaClientes").innerHTML=html

}

document.getElementById("busca").addEventListener("input",function(){

let termo=this.value.toLowerCase()

let filtrados=clientes.filter(c=>
(c.nome||"").toLowerCase().includes(termo) ||
(c.telefone||"").toLowerCase().includes(termo)
)

renderClientes(filtrados)

})

function excluir(id){

clientes=clientes.filter(c=>c.id!==id)

salvarLocal()

renderClientes()

renderDash()

}

function renderComissao(){

let instaladas=clientes.filter(c=>c.status==="instalado")

let qtd=instaladas.length

document.getElementById("inst").innerText=qtd

let total=0

instaladas.forEach(c=>{
let venda=totalVenda(c.produtos)
total+=venda*0.05
})

document.getElementById("totalCom").innerText=total.toFixed(2)

let metaValor=15

document.getElementById("meta").innerText=qtd+" / "+metaValor

document.getElementById("progresso").style.width=(qtd/metaValor*100)+"%"

}

renderDash()

</script>

</body>
</html>

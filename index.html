<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ControlComBL</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:#1c1c1e;
color:#fff;
}

.tela{
display:none;
padding:20px;
max-width:500px;
margin:auto;
}

.ativa{
display:block;
}

.card{
background:#2c2c2e;
padding:20px;
border-radius:14px;
margin-bottom:15px;
}

h1,h2{
text-align:center;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:17px;
background:#0a84ff;
color:white;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
font-size:16px;
}

.produtoLinha{
border-top:1px solid #444;
margin-top:10px;
padding-top:10px;
}

.status{
width:14px;
height:14px;
border-radius:50%;
display:inline-block;
margin-right:8px;
}

.instalado{background:#30d158;}
.pendente{background:#ffd60a;}
.nao{background:#ff453a;}

.barra{
width:100%;
height:18px;
background:#444;
border-radius:10px;
overflow:hidden;
}

#progresso{
height:18px;
background:#30d158;
width:0%;
}

.popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#30d158;
padding:12px 20px;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<div id="popup" class="popup"></div>

<!-- ENTRADA -->

<div id="entrada" class="tela ativa">

<h1>ControlComBL</h1>

<div class="card">

<button onclick="abrir('menu')">
Entrar
</button>

</div>

</div>

<!-- MENU -->

<div id="menu" class="tela">

<h2>Menu</h2>

<div class="card">

<button onclick="abrir('dashboard')">📊 Dashboard</button>

<button onclick="abrir('cadastro')">👤 Cadastrar Cliente</button>

<button onclick="abrir('clientes')">📋 Clientes</button>

<button onclick="abrir('comissao')">💰 Comissões</button>

</div>

<button onclick="abrir('entrada')">⬅ Sair</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="tela">

<h2>Dashboard</h2>

<div class="card" id="dash"></div>

<button onclick="abrir('menu')">⬅ Menu</button>

</div>

<!-- CADASTRO -->

<div id="cadastro" class="tela">

<h2>Novo Cliente</h2>

<div class="card">

<input id="nome" placeholder="Nome">

<input id="telefone" placeholder="Telefone">

<h3>Produtos</h3>

<div id="produtos"></div>

<button onclick="addProduto()">+ Adicionar produto</button>

<select id="status">
<option value="pendente">Pendente</option>
<option value="instalado">Instalado</option>
<option value="nao">Não instalado</option>
</select>

<button onclick="salvar()">Salvar Cliente</button>

</div>

<button onclick="abrir('menu')">⬅ Menu</button>

</div>

<!-- CLIENTES -->

<div id="clientes" class="tela">

<h2>Clientes</h2>

<input id="busca" placeholder="Buscar cliente" onkeyup="buscar()">

<div class="card" id="listaClientes"></div>

<button onclick="abrir('menu')">⬅ Menu</button>

</div>

<!-- COMISSÃO -->

<div id="comissao" class="tela">

<h2>Comissões</h2>

<div class="card">

Instalações: <span id="inst"></span><br>
Comissão total: R$ <span id="total"></span>

</div>

<div class="card">

Meta mensal

<div id="meta"></div>

<div class="barra">
<div id="progresso"></div>
</div>

</div>

<div class="card">

<h3>Detalhes</h3>

<div id="detalhes"></div>

</div>

<button onclick="abrir('menu')">⬅ Menu</button>

</div>

<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || []

function salvarLocal(){
localStorage.setItem("clientes",JSON.stringify(clientes))
}

function abrir(id){

document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"))
document.getElementById(id).classList.add("ativa")

if(id==="clientes")renderClientes()
if(id==="dashboard")renderDash()
if(id==="comissao")renderComissao()

}

function addProduto(){

let div=document.createElement("div")
div.className="produtoLinha"

div.innerHTML=`

<select class="produto">
<option>Internet</option>
<option>TV</option>
<option>Móvel</option>
<option>Fixo</option>
</select>

<input class="quantidade" type="number" placeholder="Quantidade">

<input class="valor" type="number" placeholder="Valor unitário">

`

document.getElementById("produtos").appendChild(div)

}

function salvar(){

let nome=document.getElementById("nome").value
let telefone=document.getElementById("telefone").value
let status=document.getElementById("status").value

let produtos=[]

document.querySelectorAll(".produtoLinha").forEach(p=>{

let tipo=p.querySelector(".produto").value
let q=parseFloat(p.querySelector(".quantidade").value)
let v=parseFloat(p.querySelector(".valor").value)

if(q && v){

produtos.push({

tipo:tipo,
quantidade:q,
valor:v

})

}

})

clientes.push({

nome:nome,
telefone:telefone,
status:status,
produtos:produtos

})

salvarLocal()

mostrarPopup("Cliente cadastrado")

document.getElementById("nome").value=""
document.getElementById("telefone").value=""
document.getElementById("produtos").innerHTML=""

}

function totalVenda(produtos){

let total=0

produtos.forEach(p=>{

total+=p.quantidade*p.valor

})

return total

}

function renderClientes(){

let html=""

clientes.forEach((c,i)=>{

let total=totalVenda(c.produtos)

html+=`

<div>

<span class="status ${c.status}"></span>

<b>${c.nome}</b><br>

📞 ${c.telefone}<br>

💰 Total venda: R$ ${total.toFixed(2)}

<select onchange="mudarStatus(${i},this.value)">

<option ${c.status==="pendente"?"selected":""} value="pendente">Pendente</option>
<option ${c.status==="instalado"?"selected":""} value="instalado">Instalado</option>
<option ${c.status==="nao"?"selected":""} value="nao">Não instalado</option>

</select>

<button onclick="excluir(${i})">Excluir</button>

<hr>

</div>

`

})

listaClientes.innerHTML=html

}

function mudarStatus(i,s){

clientes[i].status=s
salvarLocal()
renderClientes()

}

function excluir(i){

clientes.splice(i,1)
salvarLocal()
renderClientes()

}

function buscar(){

let termo=busca.value.toLowerCase()

let filtrados=clientes.filter(c=>
c.nome.toLowerCase().includes(termo)
)

let html=""

filtrados.forEach(c=>{

html+=`<div>${c.nome}</div>`

})

listaClientes.innerHTML=html

}

function renderDash(){

let totalClientes=clientes.length

let instalados=clientes.filter(c=>c.status==="instalado").length

let totalVendido=0

clientes.forEach(c=>{

totalVendido+=totalVenda(c.produtos)

})

dash.innerHTML=`

Clientes cadastrados: ${totalClientes}<br>
Instalações: ${instalados}<br>
Total vendido: R$ ${totalVendido.toFixed(2)}

`

}

function renderComissao(){

let instaladas=clientes.filter(c=>c.status==="instalado")

let qtd=instaladas.length

document.getElementById("inst").innerText=qtd

let totalCom=0
let html=""

instaladas.forEach(c=>{

let venda=totalVenda(c.produtos)

let com=venda*0.05

totalCom+=com

html+=`${c.nome} → venda R$${venda.toFixed(2)} comissão R$${com.toFixed(2)}<br>`

})

document.getElementById("total").innerText=totalCom.toFixed(2)

document.getElementById("detalhes").innerHTML=html

let metaValor=15

document.getElementById("meta").innerText=qtd+" / "+metaValor

document.getElementById("progresso").style.width=(qtd/metaValor*100)+"%"

}

function mostrarPopup(msg){

let p=document.getElementById("popup")

p.innerText=msg
p.style.display="block"

setTimeout(()=>{

p.style.display="none"

},2000)

}

</script>

</body>
</html>

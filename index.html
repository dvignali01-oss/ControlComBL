<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ControlComBL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial;
background:#0f172a;
color:#f1f5f9;
margin:0;
font-size:18px;
}

header{
padding:20px;
text-align:center;
font-size:26px;
font-weight:600;
background:#020617;
}

.container{
padding:20px;
max-width:600px;
margin:auto;
padding-bottom:100px;
}

h2{
font-size:24px;
margin-bottom:10px;
}

input,select,textarea{
width:100%;
padding:16px;
margin-top:8px;
margin-bottom:16px;
border-radius:14px;
border:none;
background:#1e293b;
color:white;
font-size:18px;
}

textarea{
min-height:100px;
}

button{
background:#22c55e;
color:white;
padding:16px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:18px;
font-weight:600;
width:100%;
}

.card{
background:#1e293b;
padding:20px;
margin-top:15px;
border-radius:18px;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
}

.card b{
font-size:20px;
}

.status{
font-size:22px;
margin-right:8px;
}

.hidden{
display:none;
}

nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#020617;
display:flex;
justify-content:space-around;
padding:12px;
border-top:1px solid #1e293b;
}

nav button{
background:none;
border:none;
color:white;
font-size:16px;
width:auto;
}
</style>
</head>

<body>

<header>ControlComBL</header>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">

<h2>Vendas</h2>

<input placeholder="Buscar cliente ou telefone" oninput="buscar(this.value)">

<div id="listaVendas"></div>

</div>

<!-- CLIENTES -->
<div id="clientes" class="hidden">

<h2>Clientes</h2>

<input id="cNome" placeholder="Nome">
<input id="cTelefone" placeholder="Telefone">
<input id="cCep" placeholder="CEP">
<input id="cEndereco" placeholder="Endereço">

<button onclick="salvarCliente()">Salvar Cliente</button>

<div id="listaClientes"></div>

</div>

<!-- NOVA VENDA -->
<div id="venda" class="hidden">

<h2>Nova Venda</h2>

<select id="clienteSelect"></select>

<select id="produto">
<option>Internet</option>
<option>Móvel</option>
<option>TV</option>
</select>

<input id="quantidade" type="number" placeholder="Quantidade">
<input id="valor" type="number" placeholder="Valor">

<label>Data da venda</label>
<input id="dataVenda" type="date">

<label>Data da instalação</label>
<input id="dataInstalacao" type="date">

<button onclick="salvarVenda()">Salvar Venda</button>

</div>

<!-- AGENDA -->
<div id="agenda" class="hidden">

<h2>Agenda</h2>

<input id="dataNota" type="date">

<textarea id="notaTexto" placeholder="Anotação sobre cliente ou venda"></textarea>

<button onclick="salvarNota()">Salvar Anotação</button>

<div id="listaNotas"></div>

</div>

</div>

<nav>
<button onclick="mostrar('dashboard')">🏠</button>
<button onclick="mostrar('clientes')">👤</button>
<button onclick="mostrar('venda')">💰</button>
<button onclick="mostrar('agenda')">📅</button>
</nav>

<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || []
let vendas = JSON.parse(localStorage.getItem("vendas")) || []
let notas = JSON.parse(localStorage.getItem("notas")) || []

function mostrar(tela){
document.getElementById("dashboard").classList.add("hidden")
document.getElementById("clientes").classList.add("hidden")
document.getElementById("venda").classList.add("hidden")
document.getElementById("agenda").classList.add("hidden")

document.getElementById(tela).classList.remove("hidden")
}

function salvarCliente(){

let cliente={
nome:cNome.value,
telefone:cTelefone.value,
cep:cCep.value,
endereco:cEndereco.value
}

clientes.push(cliente)

localStorage.setItem("clientes",JSON.stringify(clientes))

carregarClientes()

alert("Cliente cadastrado")

}

function carregarClientes(){

let lista=document.getElementById("listaClientes")
let select=document.getElementById("clienteSelect")

lista.innerHTML=""
select.innerHTML=""

clientes.forEach((c,i)=>{

lista.innerHTML+=`

<div class="card">
<b>${c.nome}</b><br>
${c.telefone}<br>
${c.endereco}
</div>

`

select.innerHTML+=`<option value="${i}">${c.nome}</option>`

})

}

function salvarVenda(){

let i=clienteSelect.value

let venda={
cliente:clientes[i].nome,
telefone:clientes[i].telefone,
produto:produto.value,
quantidade:quantidade.value,
valor:valor.value,
dataVenda:dataVenda.value,
dataInstalacao:dataInstalacao.value,
status:"pendente"
}

vendas.push(venda)

localStorage.setItem("vendas",JSON.stringify(vendas))

mostrarVendas()

alert("Venda salva")

}

function corStatus(s){
if(s=="instalado") return "🟢"
if(s=="nao") return "🔴"
return "🟡"
}

function mostrarVendas(lista=vendas){

let div=document.getElementById("listaVendas")

div.innerHTML=""

lista.forEach((v,i)=>{

div.innerHTML+=`

<div class="card">

<span class="status">${corStatus(v.status)}</span>

<b>${v.cliente}</b><br>

${v.produto} x${v.quantidade}<br>

Valor: R$ ${v.valor}<br>

Instalação: ${v.dataInstalacao}<br>

<select onchange="mudarStatus(${i},this.value)">
<option value="pendente" ${v.status=="pendente"?"selected":""}>Pendente</option>
<option value="instalado" ${v.status=="instalado"?"selected":""}>Instalado</option>
<option value="nao" ${v.status=="nao"?"selected":""}>Não instalado</option>
</select>

</div>

`

})

}

function mudarStatus(i,s){
vendas[i].status=s
localStorage.setItem("vendas",JSON.stringify(vendas))
mostrarVendas()
}

function normalizar(t){
return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
}

function buscar(t){

let busca=normalizar(t)

let filtrado=vendas.filter(v=>
normalizar(v.cliente).includes(busca) ||
normalizar(v.telefone).includes(busca)
)

mostrarVendas(filtrado)

}

function salvarNota(){

let nota={
data:dataNota.value,
texto:notaTexto.value
}

notas.push(nota)

localStorage.setItem("notas",JSON.stringify(notas))

mostrarNotas()

}

function mostrarNotas(){

let div=document.getElementById("listaNotas")

div.innerHTML=""

notas.forEach((n,i)=>{

div.innerHTML+=`

<div class="card">

<b>${n.data}</b><br>
${n.texto}

<button onclick="excluirNota(${i})">Excluir</button>

</div>

`

})

}

function excluirNota(i){

notas.splice(i,1)

localStorage.setItem("notas",JSON.stringify(notas))

mostrarNotas()

}

carregarClientes()
mostrarVendas()
mostrarNotas()

</script>

</body>
</html>

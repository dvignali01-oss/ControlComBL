<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ControlComBL</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background:#0f0f14;
color:white;
}

.topo{
padding:25px;
background:linear-gradient(135deg,#8a05be,#6a00a3);
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
}

.titulo{
font-size:22px;
font-weight:bold;
}

.saldo{
font-size:30px;
margin-top:10px;
}

.tela{
display:none;
padding:20px;
padding-bottom:100px;
max-width:500px;
margin:auto;
}

.ativa{display:block;}

.card{
background:#18181f;
border-radius:18px;
padding:18px;
margin-bottom:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

input,select{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#24242c;
color:white;
margin-top:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:10px;
background:#8a05be;
color:white;
font-size:15px;
}

.menu{
position:fixed;
bottom:0;
width:100%;
background:#18181f;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.menu button{
background:none;
font-size:20px;
}

.produto{
background:#24242c;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.status{
width:10px;
height:10px;
border-radius:50%;
display:inline-block;
margin-right:5px;
}

.instalado{background:#22c55e;}
.pendente{background:#eab308;}
.nao{background:#ef4444;}

.barra{
height:12px;
background:#24242c;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

#progresso{
height:12px;
background:#8a05be;
width:0%;
}

</style>
</head>

<body>

<div id="dashboard" class="tela ativa">

<div class="topo">

<div class="titulo">
ControlComBL
</div>

<div class="saldo">
R$ <span id="totalCom">0</span>
</div>

</div>

<div class="card" id="stats"></div>

</div>


<div id="novo" class="tela">

<h2>Novo cliente</h2>

<div class="card">

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">

</div>

<div class="card">

<h3>Produto</h3>

<div id="listaProdutos"></div>

<select id="tipoProduto">
<option>Internet</option>
<option>TV</option>
<option>Móvel</option>
<option>Fixo</option>
</select>

<input id="quantidade" type="number" placeholder="Quantidade">
<input id="valor" type="number" placeholder="Valor unitário">

<button onclick="addProduto()">Adicionar produto</button>

</div>

<div class="card">

<select id="status">
<option value="pendente">Pendente</option>
<option value="instalado">Instalado</option>
<option value="nao">Não instalado</option>
</select>

<button onclick="salvarCliente()">Salvar cliente</button>

</div>

</div>


<div id="clientes" class="tela">

<h2>Clientes</h2>

<input id="busca" placeholder="Buscar">

<div id="listaClientes"></div>

</div>


<div id="comissao" class="tela">

<h2>Comissão</h2>

<div class="card">

Instalações: <span id="inst"></span>

<div id="meta"></div>

<div class="barra">
<div id="progresso"></div>
</div>

</div>

</div>


<div class="menu">

<button onclick="abrir('dashboard')">🏠</button>
<button onclick="abrir('novo')">➕</button>
<button onclick="abrir('clientes')">👥</button>
<button onclick="abrir('comissao')">💰</button>

</div>


<script>

let clientes=JSON.parse(localStorage.getItem("clientes"))||[]
let produtosTemp=[]

function salvarLocal(){
localStorage.setItem("clientes",JSON.stringify(clientes))
}

function abrir(id){

document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"))
document.getElementById(id).classList.add("ativa")

renderDash()
renderClientes()
renderComissao()

}

function addProduto(){

let tipo=tipoProduto.value
let q=parseFloat(quantidade.value)
let v=parseFloat(valor.value)

if(!q||!v)return

produtosTemp.push({tipo,q,v})

renderProdutos()

quantidade.value=""
valor.value=""

}

function renderProdutos(){

let html=""

produtosTemp.forEach(p=>{

html+=`<div class="produto">${p.tipo} | ${p.q} x ${p.v}</div>`

})

listaProdutos.innerHTML=html

}

function salvarCliente(){

clientes.push({
id:Date.now(),
nome:nome.value,
telefone:telefone.value,
status:status.value,
produtos:[...produtosTemp]
})

produtosTemp=[]

nome.value=""
telefone.value=""

renderProdutos()

salvarLocal()

renderDash()

}

function totalVenda(produtos){

let total=0

produtos.forEach(p=>{

total+=p.q*p.v

})

return total

}

function calcularComissao(valor,instaladas){

if(valor<=90)return 4

let faixa=1

if(valor<=119.99)faixa=1
else if(valor<=149.99)faixa=2
else if(valor<=179.99)faixa=3
else if(valor<=199.99)faixa=4
else faixa=5

let tabela={

8:[8,11.52,18,27,37.5],
10:[12,17.28,27,40.5,56.25],
12:[15,21.6,33.75,50.63,70.31],
15:[20,28.8,45,67.5,93.75]

}

let chave=8

if(instaladas>=15)chave=15
else if(instaladas>=12)chave=12
else if(instaladas>=10)chave=10
else chave=8

return tabela[chave][faixa-1]

}

function renderDash(){

let totalClientes=clientes.length

let instalados=clientes.filter(c=>c.status==="instalado").length

let total=0

clientes.forEach(c=>{

total+=totalVenda(c.produtos)

})

stats.innerHTML=`

Clientes: ${totalClientes}<br>
Instalações: ${instalados}<br>
Total vendido: R$ ${total.toFixed(2)}

`

}

function renderClientes(lista=clientes){

let html=""

lista.forEach(c=>{

let total=totalVenda(c.produtos)

html+=`

<div class="card">

<span class="status ${c.status}"></span>

<b>${c.nome}</b><br>

📞 ${c.telefone}<br>

💰 R$ ${total.toFixed(2)}

<button onclick="excluir(${c.id})">Excluir</button>

</div>

`

})

listaClientes.innerHTML=html

}

busca.addEventListener("input",function(){

let termo=this.value.toLowerCase()

let filtrados=clientes.filter(c=>

(c.nome||"").toLowerCase().includes(termo)||
(c.telefone||"").toLowerCase().includes(termo)

)

renderClientes(filtrados)

})

function excluir(id){

clientes=clientes.filter(c=>c.id!==id)

salvarLocal()

renderClientes()

renderDash()

}

function renderComissao(){

let instaladas=clientes.filter(c=>c.status==="instalado")

let qtd=instaladas.length

inst.innerText=qtd

let total=0

instaladas.forEach(c=>{

let venda=totalVenda(c.produtos)

total+=calcularComissao(venda,qtd)

})

totalCom.innerText=total.toFixed(2)

let metaValor=15

meta.innerText=qtd+" / "+metaValor

progresso.style.width=(qtd/metaValor*100)+"%"

}

renderDash()
renderClientes()
renderComissao()

</script>

</body>
</html>

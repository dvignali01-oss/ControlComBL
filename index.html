<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>ControlComBL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#020617;
font-family:Arial;
margin:0;
display:flex;
justify-content:center;
color:white;
}

.app{
width:100%;
max-width:420px;
padding:20px;
}

h1{
text-align:center;
font-size:24px;
margin-bottom:15px;
}

.menu{
display:flex;
justify-content:center;
gap:8px;
margin-bottom:20px;
}

.menu button{
background:#1e293b;
border:none;
color:white;
padding:10px 14px;
border-radius:8px;
font-size:14px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:10px;
border-radius:8px;
border:none;
font-size:15px;
}

.salvar{
background:#22c55e;
color:white;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
width:100%;
}

.excluir{
background:#ef4444;
border:none;
color:white;
padding:8px;
border-radius:6px;
margin-top:6px;
}

.status{
width:10px;
height:10px;
border-radius:50%;
display:inline-block;
margin-right:6px;
}

.instalado{background:#22c55e}
.pendente{background:#eab308}
.nao{background:#ef4444}

</style>

</head>

<body>

<div class="app">

<h1>ControlComBL</h1>

<div class="menu">

<button onclick="tela('dashboard')">Dashboard</button>
<button onclick="tela('clientes')">Clientes</button>
<button onclick="tela('venda')">Venda</button>
<button onclick="tela('agenda')">Agenda</button>

</div>

<div id="dashboard"></div>
<div id="clientes" style="display:none"></div>
<div id="venda" style="display:none"></div>
<div id="agenda" style="display:none"></div>

</div>

<script>

let clientes=JSON.parse(localStorage.getItem("clientes"))||[]
let vendas=JSON.parse(localStorage.getItem("vendas"))||[]
let agenda=JSON.parse(localStorage.getItem("agenda"))||[]

function tela(id){

document.getElementById("dashboard").style.display="none"
document.getElementById("clientes").style.display="none"
document.getElementById("venda").style.display="none"
document.getElementById("agenda").style.display="none"

document.getElementById(id).style.display="block"

render()

}

function render(){

renderDashboard()
renderClientes()
renderVenda()
renderAgenda()

}

function renderDashboard(){

let html=`<h2>Dashboard</h2>

<input placeholder="Buscar cliente ou telefone" onkeyup="buscar(this.value)">
`

vendas.forEach((v,i)=>{

let classe=v.status||"pendente"

html+=`

<div class="card">

<span class="status ${classe}"></span>

<b>${v.cliente}</b>

<br>

${v.produto} - R$ ${v.valor}

<br>

Instalação: ${v.instalacao||"Não agendado"}

<br>

<select onchange="statusVenda(${i},this.value)">

<option value="pendente" ${classe=="pendente"?"selected":""}>Pendente</option>
<option value="instalado" ${classe=="instalado"?"selected":""}>Instalado</option>
<option value="nao" ${classe=="nao"?"selected":""}>Não instalado</option>

</select>

</div>

`

})

document.getElementById("dashboard").innerHTML=html

}

function statusVenda(i,s){

vendas[i].status=s

localStorage.setItem("vendas",JSON.stringify(vendas))

renderDashboard()

}

function renderClientes(){

let html=`

<h2>Cadastro Cliente</h2>

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="cep" placeholder="CEP">
<input id="endereco" placeholder="Endereço">

<button class="salvar" onclick="salvarCliente()">Salvar Cliente</button>

`

clientes.forEach((c,i)=>{

html+=`

<div class="card">

<b>${c.nome}</b>

<br>

${c.telefone}

<br>

<button class="excluir" onclick="excluirCliente(${i})">Excluir</button>

</div>

`

})

document.getElementById("clientes").innerHTML=html

}

function salvarCliente(){

let c={

nome:nome.value,
telefone:telefone.value,
cep:cep.value,
endereco:endereco.value

}

clientes.push(c)

localStorage.setItem("clientes",JSON.stringify(clientes))

renderClientes()

}

function excluirCliente(i){

let nome=clientes[i].nome

clientes.splice(i,1)

vendas=vendas.filter(v=>v.cliente!==nome)

localStorage.setItem("clientes",JSON.stringify(clientes))
localStorage.setItem("vendas",JSON.stringify(vendas))

render()

}

function renderVenda(){

let html=`

<h2>Nova Venda</h2>

<select id="clienteSelect">

${clientes.map(c=>`<option>${c.nome}</option>`)}

</select>

<select id="produto">

<option>Internet</option>
<option>Móvel</option>
<option>TV</option>

</select>

<input id="quantidade" placeholder="Quantidade">

<input id="valor" placeholder="Valor">

<label>Data venda</label>
<input type="date" id="dataVenda">

<label>Data instalação</label>
<input type="date" id="dataInstalacao">

<select id="status">

<option value="pendente">Pendente</option>
<option value="instalado">Instalado</option>
<option value="nao">Não instalado</option>

</select>

<button class="salvar" onclick="salvarVenda()">Salvar Venda</button>

`

document.getElementById("venda").innerHTML=html

}

function salvarVenda(){

let v={

cliente:clienteSelect.value,
produto:produto.value,
quantidade:quantidade.value,
valor:valor.value,
data:dataVenda.value||"",
instalacao:dataInstalacao.value||"",
status:status.value

}

vendas.push(v)

localStorage.setItem("vendas",JSON.stringify(vendas))

renderDashboard()

}

function renderAgenda(){

let html=`

<h2>Agenda</h2>

<input type="date" id="dataAgenda">
<input id="textoAgenda" placeholder="Anotação">

<button class="salvar" onclick="salvarAgenda()">Salvar</button>

`

agenda.forEach(a=>{

html+=`

<div class="card">

<b>${a.data}</b>

<br>

${a.texto}

</div>

`

})

document.getElementById("agenda").innerHTML=html

}

function salvarAgenda(){

let a={

data:dataAgenda.value,
texto:textoAgenda.value

}

agenda.push(a)

localStorage.setItem("agenda",JSON.stringify(agenda))

renderAgenda()

}

function buscar(txt){

txt=txt.toLowerCase()

let lista=vendas.filter(v=>

v.cliente.toLowerCase().includes(txt)

)

let html="<h2>Dashboard</h2>"

lista.forEach(v=>{

html+=`

<div class="card">

<b>${v.cliente}</b>

<br>

${v.produto} - R$ ${v.valor}

</div>

`

})

document.getElementById("dashboard").innerHTML=html

}

function notificar(){

let hoje=new Date().toISOString().split("T")[0]

vendas.forEach(v=>{

if(v.instalacao==hoje){

alert("Instalação hoje para "+v.cliente)

}

})

}

setInterval(notificar,60000)

render()

</script>

</body>
</html>

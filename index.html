<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ControlComBL</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-weight:bold;
}

.venda{
background:#111827;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.excluir{
background:#ef4444;
margin-top:8px;
}

</style>
</head>

<body>

<h1>ControlComBL</h1>

<div class="container">

<div class="card">

<h3>Cadastro do Cliente</h3>

<input id="nome" placeholder="Nome">

<input id="cep" placeholder="CEP">

<input id="telefone" placeholder="Telefone">

<input id="endereco" placeholder="Endereço">

<h3>Produtos</h3>

<label>Internet quantidade</label>
<input id="internetQtd" type="number">

<label>Valor internet</label>
<input id="internetValor" type="number">

<label>Móvel quantidade</label>
<input id="movelQtd" type="number">

<label>Valor móvel</label>
<input id="movelValor" type="number">

<label>TV quantidade</label>
<input id="tvQtd" type="number">

<label>Valor TV</label>
<input id="tvValor" type="number">

<label>Status</label>
<select id="status">
<option>Pendente</option>
<option>Instalado</option>
</select>

<button onclick="salvar()">Salvar Venda</button>

</div>

<div class="card">

<h3>Dashboard</h3>

<div id="lista"></div>

</div>

</div>

<script>

let vendas = JSON.parse(localStorage.getItem("vendas")) || []

function salvar(){

let nome = document.getElementById("nome").value
let cep = document.getElementById("cep").value
let telefone = document.getElementById("telefone").value
let endereco = document.getElementById("endereco").value

let internetQtd = Number(document.getElementById("internetQtd").value)
let internetValor = Number(document.getElementById("internetValor").value)

let movelQtd = Number(document.getElementById("movelQtd").value)
let movelValor = Number(document.getElementById("movelValor").value)

let tvQtd = Number(document.getElementById("tvQtd").value)
let tvValor = Number(document.getElementById("tvValor").value)

let status = document.getElementById("status").value

let total =
(internetQtd * internetValor) +
(movelQtd * movelValor) +
(tvQtd * tvValor)

let venda = {
nome,
cep,
telefone,
endereco,
internetQtd,
movelQtd,
tvQtd,
total,
status
}

vendas.push(venda)

localStorage.setItem("vendas",JSON.stringify(vendas))

mostrar()

}

function excluir(i){

vendas.splice(i,1)

localStorage.setItem("vendas",JSON.stringify(vendas))

mostrar()

}

function mostrar(){

let lista = document.getElementById("lista")

lista.innerHTML=""

vendas.forEach((v,i)=>{

lista.innerHTML += `

<div class="venda">

<b>Cliente:</b> ${v.nome}<br>

<b>Internet:</b> ${v.internetQtd}<br>
<b>Móvel:</b> ${v.movelQtd}<br>
<b>TV:</b> ${v.tvQtd}<br>

<b>Valor venda:</b> R$ ${v.total}<br>

<b>Status:</b> ${v.status}

<button class="excluir" onclick="excluir(${i})">
Excluir
</button>

</div>

`

})

}

mostrar()

</script>

</body>
</html>

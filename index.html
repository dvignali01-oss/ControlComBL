<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ControlComBL</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

nav{
display:flex;
justify-content:space-around;
background:#1e293b;
padding:10px;
}

nav button{
background:none;
border:none;
color:white;
font-size:14px;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
}

.venda{
background:#020617;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.excluir{
background:#ef4444;
margin-top:5px;
}

.stats{
display:flex;
gap:10px;
}

.stat{
flex:1;
background:#020617;
padding:15px;
border-radius:8px;
text-align:center;
}

.tela{
display:none;
}

.ativa{
display:block;
}

</style>

</head>

<body>

<header>
ControlComBL
</header>

<nav>

<button onclick="mostrarTela('dashboard')">
Dashboard
</button>

<button onclick="mostrarTela('clientes')">
Clientes
</button>

<button onclick="mostrarTela('vendas')">
Nova Venda
</button>

</nav>

<div class="container">

<!-- DASHBOARD -->

<div id="dashboard" class="tela ativa">

<div class="stats">

<div class="stat">
Clientes
<h2 id="totalClientes">0</h2>
</div>

<div class="stat">
Vendas
<h2 id="totalVendas">0</h2>
</div>

<div class="stat">
Total
<h2 id="valorTotal">0</h2>
</div>

</div>

<div class="card">

<h3>Lista de Vendas</h3>

<div id="listaVendas"></div>

</div>

</div>

<!-- CLIENTES -->

<div id="clientes" class="tela">

<div class="card">

<h3>Cadastrar Cliente</h3>

<input id="nome" placeholder="Nome">

<input id="cep" placeholder="CEP">

<input id="telefone" placeholder="Telefone">

<input id="endereco" placeholder="Endereço">

<button onclick="salvarCliente()">
Salvar Cliente
</button>

</div>

<div class="card">

<h3>Buscar Cliente</h3>

<input id="buscarCliente" placeholder="Digite o nome" onkeyup="buscarCliente()">

</div>

<div class="card">

<h3>Lista de Clientes</h3>

<div id="listaClientes"></div>

</div>

</div>

<!-- VENDAS -->

<div id="vendas" class="tela">

<div class="card">

<h3>Nova Venda</h3>

<select id="clienteVenda"></select>

<label>Internet quantidade</label>
<input id="internetQtd" type="number">

<label>Valor internet</label>
<input id="internetValor" type="number">

<label>Móvel quantidade</label>
<input id="movelQtd" type="number">

<label>Valor móvel</label>
<input id="movelValor" type="number">

<label>TV quantidade</label>
<input id="tvQtd" type="number">

<label>Valor TV</label>
<input id="tvValor" type="number">

<select id="status">
<option>Pendente</option>
<option>Instalado</option>
</select>

<button onclick="salvarVenda()">
Salvar Venda
</button>

</div>

</div>

</div>

<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || []
let vendas = JSON.parse(localStorage.getItem("vendas")) || []

function mostrarTela(id){

document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"))
document.getElementById(id).classList.add("ativa")

}

function salvarCliente(){

let cliente = {

nome:document.getElementById("nome").value,
cep:document.getElementById("cep").value,
telefone:document.getElementById("telefone").value,
endereco:document.getElementById("endereco").value

}

clientes.push(cliente)

localStorage.setItem("clientes",JSON.stringify(clientes))

carregarClientes()
atualizarDashboard()

}

function carregarClientes(){

let lista = document.getElementById("listaClientes")
let select = document.getElementById("clienteVenda")

lista.innerHTML=""
select.innerHTML=""

clientes.forEach((c,i)=>{

lista.innerHTML+=`

<div class="venda">

${c.nome}

<button class="excluir" onclick="excluirCliente(${i})">
Excluir
</button>

</div>

`

select.innerHTML+=`<option>${c.nome}</option>`

})

}

function excluirCliente(i){

clientes.splice(i,1)

localStorage.setItem("clientes",JSON.stringify(clientes))

carregarClientes()
atualizarDashboard()

}

function buscarCliente(){

let busca = document.getElementById("buscarCliente").value.toLowerCase()

let lista = document.getElementById("listaClientes")

lista.innerHTML=""

clientes
.filter(c=>c.nome.toLowerCase().includes(busca))
.forEach((c,i)=>{

lista.innerHTML+=`

<div class="venda">

${c.nome}

<button class="excluir" onclick="excluirCliente(${i})">
Excluir
</button>

</div>

`

})

}

function salvarVenda(){

let cliente = document.getElementById("clienteVenda").value

let internetQtd = Number(document.getElementById("internetQtd").value)
let internetValor = Number(document.getElementById("internetValor").value)

let movelQtd = Number(document.getElementById("movelQtd").value)
let movelValor = Number(document.getElementById("movelValor").value)

let tvQtd = Number(document.getElementById("tvQtd").value)
let tvValor = Number(document.getElementById("tvValor").value)

let status = document.getElementById("status").value

let total =
(internetQtd*internetValor)+
(movelQtd*movelValor)+
(tvQtd*tvValor)

let venda = {

cliente,
internetQtd,
movelQtd,
tvQtd,
total,
status

}

vendas.push(venda)

localStorage.setItem("vendas",JSON.stringify(vendas))

mostrarVendas()
atualizarDashboard()

}

function mostrarVendas(){

let lista = document.getElementById("listaVendas")

lista.innerHTML=""

vendas.forEach((v,i)=>{

lista.innerHTML+=`

<div class="venda">

<b>Cliente:</b> ${v.cliente}<br>

Internet: ${v.internetQtd}<br>
Móvel: ${v.movelQtd}<br>
TV: ${v.tvQtd}<br>

<b>Valor:</b> R$ ${v.total}<br>

<b>Status:</b> ${v.status}

<button class="excluir" onclick="excluirVenda(${i})">
Excluir
</button>

</div>

`

})

}

function excluirVenda(i){

vendas.splice(i,1)

localStorage.setItem("vendas",JSON.stringify(vendas))

mostrarVendas()
atualizarDashboard()

}

function atualizarDashboard(){

document.getElementById("totalClientes").innerText = clientes.length

document.getElementById("totalVendas").innerText = vendas.length

let total = vendas.reduce((acc,v)=>acc+v.total,0)

document.getElementById("valorTotal").innerText = "R$ "+total

}

carregarClientes()
mostrarVendas()
atualizarDashboard()

</script>

</body>
</html>

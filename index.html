

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ControlComBL</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

nav{
display:flex;
justify-content:space-around;
background:#1e293b;
padding:10px;
}

nav button{
background:none;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

.container{
padding:20px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button.salvar{
background:#22c55e;
color:white;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:15px;
margin-top:10px;
border-radius:10px;
}

.status{
font-size:18px;
margin-right:5px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<header>ControlComBL</header>

<nav>
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('nova')">Nova Venda</button>
<button onclick="mostrar('clientes')">Clientes</button>
<button onclick="mostrar('agenda')">Agenda</button>
</nav>

<div class="container">

<div id="dashboard">

<h2>Vendas</h2>

<input placeholder="Buscar cliente ou telefone"
oninput="buscar(this.value)">

<div id="listaVendas"></div>

</div>

<div id="nova" class="hidden">

<h2>Nova Venda</h2>

<input id="nome" placeholder="Nome">

<input id="telefone" placeholder="Telefone">

<input id="cep" placeholder="CEP">

<input id="endereco" placeholder="Endereço">

<select id="produto">
<option>Internet</option>
<option>Móvel</option>
<option>TV</option>
</select>

<input id="quantidade" type="number" placeholder="Quantidade">

<input id="valor" type="number" placeholder="Valor">

<label>Data da venda</label>
<input id="dataVenda" type="date">

<label>Data da instalação</label>
<input id="dataInstalacao" type="date">

<button class="salvar" onclick="salvarVenda()">Salvar Venda</button>

</div>

<div id="clientes" class="hidden">

<h2>Clientes</h2>

<div id="listaClientes"></div>

</div>

<div id="agenda" class="hidden">

<h2>Agenda do vendedor</h2>

<input id="dataNota" type="date">

<textarea id="nota" placeholder="Anotação"></textarea>

<button class="salvar" onclick="salvarNota()">Salvar anotação</button>

<div id="listaNotas"></div>

</div>

</div>

<script>

let vendas = JSON.parse(localStorage.getItem("vendas")) || []
let notas = JSON.parse(localStorage.getItem("notas")) || []

function mostrar(tela){

document.getElementById("dashboard").classList.add("hidden")
document.getElementById("nova").classList.add("hidden")
document.getElementById("clientes").classList.add("hidden")
document.getElementById("agenda").classList.add("hidden")

document.getElementById(tela).classList.remove("hidden")

}

function salvarVenda(){

let venda = {

nome:document.getElementById("nome").value,
telefone:document.getElementById("telefone").value,
cep:document.getElementById("cep").value,
endereco:document.getElementById("endereco").value,
produto:document.getElementById("produto").value,
quantidade:document.getElementById("quantidade").value,
valor:document.getElementById("valor").value,
dataVenda:document.getElementById("dataVenda").value,
dataInstalacao:document.getElementById("dataInstalacao").value,
status:"pendente"

}

vendas.push(venda)

localStorage.setItem("vendas",JSON.stringify(vendas))

mostrarVendas()

alert("Venda salva")

}

function corStatus(status){

if(status==="instalado") return "🟢"
if(status==="nao") return "🔴"
return "🟡"

}

function mostrarVendas(lista=vendas){

let div = document.getElementById("listaVendas")

div.innerHTML=""

lista.forEach((v,i)=>{

div.innerHTML+=`

<div class="card">

<span class="status">${corStatus(v.status)}</span>

<b>${v.nome}</b><br>

${v.produto} x${v.quantidade}<br>

Valor: R$ ${v.valor}<br>

Instalação: ${v.dataInstalacao}<br>

<select onchange="mudarStatus(${i},this.value)">

<option value="pendente" ${v.status=="pendente"?"selected":""}>Pendente</option>

<option value="instalado" ${v.status=="instalado"?"selected":""}>Instalado</option>

<option value="nao" ${v.status=="nao"?"selected":""}>Não instalado</option>

</select>

</div>

`

})

}

function mudarStatus(i,status){

vendas[i].status=status

localStorage.setItem("vendas",JSON.stringify(vendas))

mostrarVendas()

}

function normalizar(t){

return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")

}

function buscar(texto){

let busca = normalizar(texto)

let filtrado = vendas.filter(v=>

normalizar(v.nome).includes(busca) ||

normalizar(v.telefone).includes(busca)

)

mostrarVendas(filtrado)

}

function salvarNota(){

let nota={

data:document.getElementById("dataNota").value,
texto:document.getElementById("nota").value

}

notas.push(nota)

localStorage.setItem("notas",JSON.stringify(notas))

mostrarNotas()

}

function mostrarNotas(){

let div=document.getElementById("listaNotas")

div.innerHTML=""

notas.forEach((n,i)=>{

div.innerHTML+=`

<div class="card">

<b>${n.data}</b><br>

${n.texto}<br>

<button onclick="excluirNota(${i})">Excluir</button>

</div>

`

})

}

function excluirNota(i){

notas.splice(i,1)

localStorage.setItem("notas",JSON.stringify(notas))

mostrarNotas()

}

mostrarVendas()
mostrarNotas()

</script>

</body>
</html>

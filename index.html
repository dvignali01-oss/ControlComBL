<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ControlComBL</title>

<style>

:root{
--bg:#1c1c1e;
--card:#2c2c2e;
--text:#ffffff;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:var(--bg);
color:var(--text);
}

.tela{
display:none;
padding:20px;
max-width:500px;
margin:auto;
}

.ativa{
display:block;
}

.card{
background:var(--card);
padding:20px;
border-radius:14px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

h1,h2{
text-align:center;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:17px;
background:#0a84ff;
color:white;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
font-size:16px;
}

.status{
width:14px;
height:14px;
border-radius:50%;
display:inline-block;
margin-right:8px;
}

.instalado{background:#30d158;}
.pendente{background:#ffd60a;}
.nao{background:#ff453a;}

.barra{
width:100%;
height:18px;
background:#444;
border-radius:10px;
overflow:hidden;
}

#progresso{
height:18px;
background:#30d158;
width:0%;
}

.popup{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:#30d158;
padding:15px 25px;
border-radius:10px;
display:none;
}

.linhaVenda{
padding:12px;
border-bottom:1px solid #444;
}

</style>

</head>

<body>

<div id="popup" class="popup"></div>

<!-- TELA DE ACESSO -->

<div id="acesso" class="tela ativa">

<h1>ControlComBL</h1>

<div class="card">

<p style="text-align:center">
Sistema de gestão de vendas
</p>

<button onclick="abrir('menu')">
Entrar no sistema
</button>

</div>

</div>

<!-- MENU PRINCIPAL -->

<div id="menu" class="tela">

<h2>Menu</h2>

<div class="card">

<button onclick="abrir('dashboard')">📊 Dashboard</button>

<button onclick="abrir('cadastro')">👤 Cadastrar cliente</button>

<button onclick="abrir('clientes')">📋 Clientes</button>

<button onclick="abrir('vendas')">💳 Vendas</button>

<button onclick="abrir('comissao')">💰 Comissões</button>

</div>

<button onclick="abrir('acesso')">⬅ Sair</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="tela">

<h2>Dashboard</h2>

<div class="card" id="dash"></div>

<button onclick="abrir('menu')">⬅ Menu</button>

</div>

<!-- CADASTRO -->

<div id="cadastro" class="tela">

<h2>Novo Cliente</h2>

<div class="card">

<input id="nome" placeholder="Nome">

<input id="telefone" placeholder="Telefone">

<input id="valor" placeholder="Valor da venda">

<select id="status">

<option value="pendente">Pendente</option>
<option value="instalado">Instalado</option>
<option value="nao">Não instalado</option>

</select>

<button onclick="salvar()">Salvar cliente</button>

</div>

<button onclick="abrir('menu')">⬅ Menu</button>

</div>

<!-- CLIENTES -->

<div id="clientes" class="tela">

<h2>Clientes</h2>

<input id="busca" placeholder="Buscar cliente" onkeyup="buscar()">

<div class="card" id="listaClientes"></div>

<button onclick="abrir('menu')">⬅ Menu</button>

</div>

<!-- VENDAS -->

<div id="vendas" class="tela">

<h2>Vendas</h2>

<div class="card" id="listaVendas"></div>

<button onclick="abrir('menu')">⬅ Menu</button>

</div>

<!-- COMISSÕES -->

<div id="comissao" class="tela">

<h2>Comissões</h2>

<div class="card">

Instalações: <span id="inst"></span><br>
Comissão total: R$ <span id="total"></span>

</div>

<div class="card">

Meta mensal

<div id="meta"></div>

<div class="barra">
<div id="progresso"></div>
</div>

</div>

<div class="card">

<h3>Detalhes</h3>

<div id="detalhes"></div>

</div>

<div class="card">

<h3>Simulador</h3>

<input id="valorSim" placeholder="Valor da venda">

<button onclick="simular()">Simular</button>

<div id="resultadoSim"></div>

</div>

<button onclick="abrir('menu')">⬅ Menu</button>

</div>

<script>

let clientes=[]

function abrir(id){

document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"))

document.getElementById(id).classList.add("ativa")

if(id==="clientes")renderClientes()
if(id==="dashboard")renderDash()
if(id==="vendas")renderVendas()
if(id==="comissao")renderComissao()

}

function salvar(){

clientes.push({

nome:nome.value,
telefone:telefone.value,
valor:parseFloat(valor.value),
status:status.value

})

popup("Cliente cadastrado")

nome.value=""
telefone.value=""
valor.value=""

}

function renderClientes(){

let html=""

clientes.forEach((c,i)=>{

html+=`

<div>

<span class="status ${c.status}"></span>

<b>${c.nome}</b><br>

📞 ${c.telefone}<br>

💰 R$ ${c.valor}

<select onchange="mudarStatus(${i},this.value)">

<option ${c.status==="pendente"?"selected":""} value="pendente">Pendente</option>
<option ${c.status==="instalado"?"selected":""} value="instalado">Instalado</option>
<option ${c.status==="nao"?"selected":""} value="nao">Não instalado</option>

</select>

<button onclick="excluir(${i})">Excluir</button>

<hr>

</div>

`

})

listaClientes.innerHTML=html

}

function renderVendas(){

let html=""

clientes.forEach(c=>{

html+=`

<div class="linhaVenda">

<b>${c.nome}</b><br>

Valor venda: R$ ${c.valor}<br>

Status: ${c.status}

</div>

`

})

listaVendas.innerHTML=html

}

function mudarStatus(i,s){

clientes[i].status=s

renderClientes()

}

function excluir(i){

clientes.splice(i,1)

renderClientes()

}

function buscar(){

let termo=normalizar(busca.value)

let filtrados=clientes.filter(c=>normalizar(c.nome).includes(termo)||normalizar(c.telefone).includes(termo))

let html=""

filtrados.forEach(c=>{

html+=`<div>${c.nome}</div>`

})

listaClientes.innerHTML=html

}

function normalizar(t){

return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")

}

function renderDash(){

let total=clientes.length

let instalados=clientes.filter(c=>c.status==="instalado").length

dash.innerHTML=`

Clientes cadastrados: ${total}<br>

Instalações concluídas: ${instalados}

`

}

function faixa(v){

if(v<=90)return 0
if(v<120)return 1
if(v<150)return 2
if(v<180)return 3
if(v<200)return 4
return 5

}

function tabela(i){

if(i>=15)return[20,28.8,45,67.5,93.75]
if(i>=12)return[15,21.6,33.75,50.63,70.31]
if(i>=10)return[12,17.28,27,40.5,56.25]
if(i>=8)return[8,11.52,18,27,37.5]

return[0,0,0,0,0]

}

function renderComissao(){

let instaladas=clientes.filter(c=>c.status==="instalado")

let qtd=instaladas.length

inst.innerText=qtd

let tab=tabela(qtd)

let totalCom=0

let html=""

instaladas.forEach(c=>{

let f=faixa(c.valor)

let com=f===0?4:tab[f-1]

totalCom+=com

html+=`${c.nome} - R$${c.valor} → comissão R$${com.toFixed(2)}<br>`

})

total.innerText=totalCom.toFixed(2)

detalhes.innerHTML=html

let meta=15

meta.innerText=qtd+" / "+meta

progresso.style.width=(qtd/meta*100)+"%"

}

function simular(){

let valor=parseFloat(valorSim.value)

let niveis=[8,10,12,15]

let html=""

niveis.forEach(n=>{

let tab=tabela(n)

let f=faixa(valor)

let com=f===0?4:tab[f-1]

html+=`Com ${n} instalações → R$ ${com.toFixed(2)}<br>`

})

resultadoSim.innerHTML=html

}

function popup(msg){

popup.innerText=msg

popup.style.display="block"

setTimeout(()=>popup.style.display="none",2500)

}

</script>

</body>
</html>

<div id="telaComissao" class="tela">

<h2>💰 Comissões</h2>

<div class="card">
<h3>Resumo</h3>
<p>Instalações: <span id="totalInstaladas"></span></p>
<p>Comissão total: R$ <span id="valorComissao"></span></p>
</div>

<div class="card">
<h3>🎯 Meta</h3>
<p><span id="instaladasMeta"></span> / <span id="metaMes"></span></p>

<div class="barra">
<div id="progressoMeta"></div>
</div>

</div>

<div class="card">
<h3>📋 Vendas que geraram comissão</h3>
<div id="listaComissao"></div>
</div>

<div class="card">
<h3>🧮 Simulador de comissão</h3>

<input type="number" id="valorSimulador" placeholder="Valor da venda">

<button onclick="simularComissao()">Simular</button>

<div id="resultadoSimulador"></div>

</div>

</div>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ControlComBL</title>

<style>

:root{
--bg:#f2f2f7;
--card:#ffffff;
--text:#000;
}

.dark{
--bg:#1c1c1e;
--card:#2c2c2e;
--text:#fff;
}

body{
font-family:-apple-system,BlinkMacSystemFont;
background:var(--bg);
color:var(--text);
margin:0;
}

.tela{
display:none;
padding:20px;
max-width:500px;
margin:auto;
}

.ativa{
display:block;
}

.card{
background:var(--card);
padding:20px;
border-radius:14px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
}

h1,h2{
text-align:center;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:17px;
background:#007aff;
color:white;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

.menu button{
font-size:20px;
padding:18px;
}

.status{
width:14px;
height:14px;
border-radius:50%;
display:inline-block;
margin-right:8px;
}

.instalado{background:#34c759;}
.pendente{background:#ffcc00;}
.nao{background:#ff3b30;}

.barra{
width:100%;
height:20px;
background:#ccc;
border-radius:10px;
overflow:hidden;
}

#progresso{
height:20px;
background:#34c759;
width:0%;
}

.popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#34c759;
color:white;
padding:14px 20px;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<div id="popup" class="popup"></div>

<!-- MENU -->

<div id="menu" class="tela ativa">

<h1>ControlComBL</h1>

<div class="menu">

<button onclick="abrir('dashboard')">📊 Dashboard</button>

<button onclick="abrir('cadastro')">👤 Cadastrar Cliente</button>

<button onclick="abrir('clientes')">📋 Clientes</button>

<button onclick="abrir('vendas')">💳 Vendas</button>

<button onclick="abrir('comissao')">💰 Comissões</button>

<button onclick="alternarTema()">🌙 Tema Escuro</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="tela">

<h2>Dashboard</h2>

<div class="card" id="dash"></div>

<button onclick="abrir('menu')">⬅ Voltar</button>

</div>

<!-- CADASTRO -->

<div id="cadastro" class="tela">

<h2>Novo Cliente</h2>

<div class="card">

<input id="nome" placeholder="Nome">

<input id="telefone" placeholder="Telefone">

<input id="valor" placeholder="Valor da venda">

<select id="status">

<option value="pendente">Pendente</option>
<option value="instalado">Instalado</option>
<option value="nao">Não instalado</option>

</select>

<button onclick="salvar()">Salvar</button>

</div>

<button onclick="abrir('menu')">⬅ Voltar</button>

</div>

<!-- CLIENTES -->

<div id="clientes" class="tela">

<h2>Clientes</h2>

<input id="busca" placeholder="Buscar" onkeyup="buscar()">

<div class="card" id="lista"></div>

<button onclick="abrir('menu')">⬅ Voltar</button>

</div>

<!-- VENDAS -->

<div id="vendas" class="tela">

<h2>Vendas</h2>

<div class="card" id="listaVendas"></div>

<button onclick="abrir('menu')">⬅ Voltar</button>

</div>

<!-- COMISSÃO -->

<div id="comissao" class="tela">

<h2>Comissões</h2>

<div class="card">

Instalações: <span id="inst"></span><br>
Comissão total: R$ <span id="total"></span>

</div>

<div class="card">

Meta do mês

<div id="meta"></div>

<div class="barra">
<div id="progresso"></div>
</div>

</div>

<div class="card">

<h3>Detalhes</h3>

<div id="detalhes"></div>

</div>

<div class="card">

<h3>Simulador</h3>

<input id="valorSim" placeholder="Valor da venda">

<button onclick="simular()">Simular</button>

<div id="sim"></div>

</div>

<button onclick="abrir('menu')">⬅ Voltar</button>

</div>

<script>

let clientes=[]

function abrir(t){

document.querySelectorAll(".tela").forEach(e=>e.classList.remove("ativa"))

document.getElementById(t).classList.add("ativa")

if(t=="clientes")renderClientes()
if(t=="dashboard")renderDash()
if(t=="vendas")renderVendas()
if(t=="comissao")renderComissao()

}

function salvar(){

clientes.push({

nome:nome.value,
telefone:telefone.value,
valor:parseFloat(valor.value),
status:status.value

})

popupMsg("Cliente salvo")

nome.value=""
telefone.value=""
valor.value=""

}

function renderClientes(){

let html=""

clientes.forEach((c,i)=>{

html+=`

<div>

<span class="status ${c.status}"></span>

<b>${c.nome}</b><br>

${c.telefone}<br>

R$ ${c.valor}

<select onchange="mudar(${i},this.value)">

<option ${c.status=="pendente"?"selected":""} value="pendente">Pendente</option>
<option ${c.status=="instalado"?"selected":""} value="instalado">Instalado</option>
<option ${c.status=="nao"?"selected":""} value="nao">Não instalado</option>

</select>

<button onclick="del(${i})">Excluir</button>

<hr>

</div>

`

})

lista.innerHTML=html

}

function mudar(i,s){

clientes[i].status=s

renderClientes()

}

function del(i){

clientes.splice(i,1)

renderClientes()

}

function buscar(){

let t=normalizar(busca.value)

let listaFiltrada=clientes.filter(c=>

normalizar(c.nome).includes(t) ||
normalizar(c.telefone).includes(t)

)

let html=""

listaFiltrada.forEach(c=>{

html+=`<div>${c.nome}</div>`

})

lista.innerHTML=html

}

function normalizar(t){

return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")

}

function renderDash(){

let total=clientes.length

let inst=clientes.filter(c=>c.status=="instalado").length

dash.innerHTML=`

Clientes: ${total}<br>
Instalados: ${inst}

`

}

function renderVendas(){

let html=""

clientes.forEach(c=>{

html+=`

${c.nome} - R$ ${c.valor}<br>

`

})

listaVendas.innerHTML=html

}

function faixa(v){

if(v<=90)return 0
if(v<120)return 1
if(v<150)return 2
if(v<180)return 3
if(v<200)return 4
return 5

}

function tabela(i){

if(i>=15)return[20,28.8,45,67.5,93.75]
if(i>=12)return[15,21.6,33.75,50.63,70.31]
if(i>=10)return[12,17.28,27,40.5,56.25]
if(i>=8)return[8,11.52,18,27,37.5]

return[0,0,0,0,0]

}

function renderComissao(){

let instaladas=clientes.filter(c=>c.status=="instalado")

let q=instaladas.length

inst.innerText=q

let tab=tabela(q)

let totalCom=0

let html=""

instaladas.forEach(c=>{

let f=faixa(c.valor)

let com=f==0?4:tab[f-1]

totalCom+=com

html+=`${c.nome} - R$${c.valor} → R$${com.toFixed(2)}<br>`

})

total.innerText=totalCom.toFixed(2)

detalhes.innerHTML=html

let meta=15

meta.innerText=q+" / "+meta

progresso.style.width=(q/meta*100)+"%"

}

function simular(){

let v=parseFloat(valorSim.value)

let niveis=[8,10,12,15]

let r=""

niveis.forEach(n=>{

let tab=tabela(n)

let f=faixa(v)

let com=f==0?4:tab[f-1]

r+=`Com ${n} instalações: R$${com.toFixed(2)}<br>`

})

sim.innerHTML=r

}

function popupMsg(msg){

popup.innerText=msg

popup.style.display="block"

setTimeout(()=>popup.style.display="none",2500)

}

function alternarTema(){

document.body.classList.toggle("dark")

}

</script>

</body>
</html>

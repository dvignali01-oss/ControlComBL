
<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ControlComBL</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

nav{
display:flex;
justify-content:space-around;
background:#1e293b;
padding:10px;
}

nav button{
background:none;
border:none;
color:white;
font-size:14px;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
}

.venda{
background:#020617;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.excluir{
background:#ef4444;
margin-top:5px;
}

.tela{
display:none;
}

.ativa{
display:block;
}

</style>

</head>

<body>

<header>
ControlComBL
</header>

<nav>

<button onclick="mostrarTela('dashboard')">
Dashboard
</button>

<button onclick="mostrarTela('clientes')">
Clientes
</button>

<button onclick="mostrarTela('vendas')">
Nova Venda
</button>

<button onclick="mostrarTela('comissao')">
Comissões
</button>

</nav>

<div class="container">

<!-- DASHBOARD -->

<div id="dashboard" class="tela ativa">

<div class="card">

<h3>Histórico de Vendas</h3>

<div id="listaVendas"></div>

</div>

</div>

<!-- CLIENTES -->

<div id="clientes" class="tela">

<div class="card">

<h3>Cadastrar Cliente</h3>

<input id="nome" placeholder="Nome">
<input id="cep" placeholder="CEP">
<input id="telefone" placeholder="Telefone">
<input id="endereco" placeholder="Endereço">

<button onclick="salvarCliente()">
Salvar Cliente
</button>

</div>

<div class="card">

<h3>Clientes</h3>

<div id="listaClientes"></div>

</div>

<div class="card">

<h3>Histórico por Cliente</h3>

<select id="clienteHistorico" onchange="historicoCliente()"></select>

<div id="historico"></div>

</div>

</div>

<!-- VENDAS -->

<div id="vendas" class="tela">

<div class="card">

<h3>Nova Venda</h3>

<select id="clienteVenda"></select>

<label>Internet quantidade</label>
<input id="internetQtd" type="number">

<label>Valor internet</label>
<input id="internetValor" type="number">

<label>Móvel quantidade</label>
<input id="movelQtd" type="number">

<label>Valor móvel</label>
<input id="movelValor" type="number">

<label>TV quantidade</label>
<input id="tvQtd" type="number">

<label>Valor TV</label>
<input id="tvValor" type="number">

<label>Data da venda</label>
<input id="dataVenda" type="date">

<label>Data da instalação</label>
<input id="dataInstalacao" type="date">

<select id="status">
<option>Pendente</option>
<option>Instalado</option>
</select>

<button onclick="salvarVenda()">
Salvar Venda
</button>

</div>

</div>

<!-- COMISSÕES -->

<div id="comissao" class="tela">

<div class="card">

<h3>Comissões</h3>

<label>Percentual de comissão</label>
<input id="percentual" type="number" value="10">

<button onclick="calcularComissao()">
Calcular</button>

<div id="resultadoComissao"></div>

</div>

</div>

</div>

<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || []
let vendas = JSON.parse(localStorage.getItem("vendas")) || []

function mostrarTela(id){

document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"))
document.getElementById(id).classList.add("ativa")

}

function salvarCliente(){

let cliente = {

nome:document.getElementById("nome").value,
cep:document.getElementById("cep").value,
telefone:document.getElementById("telefone").value,
endereco:document.getElementById("endereco").value

}

clientes.push(cliente)

localStorage.setItem("clientes",JSON.stringify(clientes))

carregarClientes()

}

function carregarClientes(){

let lista = document.getElementById("listaClientes")
let selectVenda = document.getElementById("clienteVenda")
let selectHistorico = document.getElementById("clienteHistorico")

lista.innerHTML=""
selectVenda.innerHTML=""
selectHistorico.innerHTML=""

clientes.forEach((c,i)=>{

lista.innerHTML+=`

<div class="venda">

${c.nome}

<button class="excluir" onclick="excluirCliente(${i})">
Excluir
</button>

</div>

`

selectVenda.innerHTML+=`<option>${c.nome}</option>`
selectHistorico.innerHTML+=`<option>${c.nome}</option>`

})

}

function excluirCliente(i){

clientes.splice(i,1)

localStorage.setItem("clientes",JSON.stringify(clientes))

carregarClientes()

}

function salvarVenda(){

let cliente = document.getElementById("clienteVenda").value

let internetQtd = Number(document.getElementById("internetQtd").value)
let internetValor = Number(document.getElementById("internetValor").value)

let movelQtd = Number(document.getElementById("movelQtd").value)
let movelValor = Number(document.getElementById("movelValor").value)

let tvQtd = Number(document.getElementById("tvQtd").value)
let tvValor = Number(document.getElementById("tvValor").value)

let dataVenda = document.getElementById("dataVenda").value
let dataInstalacao = document.getElementById("dataInstalacao").value

let status = document.getElementById("status").value

let total =
(internetQtd*internetValor)+
(movelQtd*movelValor)+
(tvQtd*tvValor)

let venda = {

cliente,
internetQtd,
movelQtd,
tvQtd,
total,
dataVenda,
dataInstalacao,
status

}

vendas.push(venda)

localStorage.setItem("vendas",JSON.stringify(vendas))

mostrarVendas()

}

function mostrarVendas(){

let lista = document.getElementById("listaVendas")

lista.innerHTML=""

vendas.forEach((v,i)=>{

lista.innerHTML+=`

<div class="venda">

<b>Cliente:</b> ${v.cliente}<br>

<b>Venda:</b> ${v.dataVenda}<br>

<b>Instalação:</b> ${v.dataInstalacao}<br>

Internet: ${v.internetQtd}<br>
Móvel: ${v.movelQtd}<br>
TV: ${v.tvQtd}<br>

<b>Valor:</b> R$ ${v.total}<br>

<b>Status:</b> ${v.status}

<button class="excluir" onclick="excluirVenda(${i})">
Excluir
</button>

</div>

`

})

}

function excluirVenda(i){

vendas.splice(i,1)

localStorage.setItem("vendas",JSON.stringify(vendas))

mostrarVendas()

}

function historicoCliente(){

let cliente = document.getElementById("clienteHistorico").value

let lista = document.getElementById("historico")

lista.innerHTML=""

vendas
.filter(v=>v.cliente===cliente)
.forEach(v=>{

lista.innerHTML+=`

<div class="venda">

Venda: ${v.dataVenda}<br>

Instalação: ${v.dataInstalacao}<br>

Valor: R$ ${v.total}<br>

Status: ${v.status}

</div>

`

})

}

function calcularComissao(){

let percentual = Number(document.getElementById("percentual").value)

let total = vendas.reduce((acc,v)=>acc+v.total,0)

let comissao = total*(percentual/100)

document.getElementById("resultadoComissao").innerHTML=

`Total vendido: R$ ${total}<br><br>

Comissão (${percentual}%):

<b>R$ ${comissao}</b>`

}

function pedirPermissaoNotificacao(){

if("Notification" in window){

if(Notification.permission !== "granted"){

Notification.requestPermission()

}

}

}

function verificarInstalacoesHoje(){

let hoje = new Date().toISOString().split("T")[0]

let instalacoesHoje = vendas.filter(v => v.dataInstalacao === hoje)

if(instalacoesHoje.length > 0){

alert("⚠ Você tem " + instalacoesHoje.length + " instalação hoje!")

}

instalacoesHoje.forEach(v=>{

if(Notification.permission === "granted"){

new Notification("Instalação hoje!",{
body:"Cliente: " + v.cliente
})

}

})

}

carregarClientes()
mostrarVendas()
pedirPermissaoNotificacao()
verificarInstalacoesHoje()

</script>

</body>
</html>

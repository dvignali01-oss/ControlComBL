<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>ControlComBL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#020617;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
display:flex;
justify-content:center;
color:white;
}

.app{
width:100%;
max-width:430px;
min-height:100vh;
background:#020617;
display:flex;
flex-direction:column;
}

header{
text-align:center;
padding:20px;
font-size:24px;
font-weight:600;
border-bottom:1px solid #1e293b;
}

.container{
padding:18px;
padding-bottom:100px;
}

input,select{
width:100%;
padding:16px;
border-radius:14px;
border:none;
background:#1e293b;
color:white;
font-size:17px;
margin-bottom:12px;
}

button{
padding:16px;
border:none;
border-radius:14px;
font-size:17px;
font-weight:600;
cursor:pointer;
}

.salvar{
background:#22c55e;
color:white;
width:100%;
}

.excluir{
background:#ef4444;
color:white;
margin-top:10px;
width:100%;
}

.card{
background:#1e293b;
padding:18px;
border-radius:18px;
margin-bottom:14px;
box-shadow:0 6px 16px rgba(0,0,0,0.4);
}

.status{
width:12px;
height:12px;
border-radius:50%;
display:inline-block;
margin-right:6px;
}

.instalado{background:#22c55e}
.pendente{background:#eab308}
.nao{background:#ef4444}

.hidden{
display:none;
}

nav{
position:fixed;
bottom:0;
width:100%;
max-width:430px;
background:#020617;
display:flex;
justify-content:space-around;
padding:12px 0;
border-top:1px solid #1e293b;
}

nav button{
background:none;
color:white;
font-size:24px;
}

.telaInicio{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:70vh;
text-align:center;
}

.logo{
font-size:36px;
font-weight:700;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="app">

<header>ControlComBL</header>

<div class="container">

<div id="inicio" class="telaInicio">

<div class="logo">ControlComBL</div>

<button class="salvar" onclick="entrar()">Entrar no App</button>

</div>

<div id="dashboard" class="hidden"></div>

<div id="clientes" class="hidden"></div>

<div id="venda" class="hidden"></div>

<div id="agenda" class="hidden"></div>

</div>

<nav id="menu" class="hidden">

<button onclick="mostrar('dashboard')">🏠</button>
<button onclick="mostrar('clientes')">👤</button>
<button onclick="mostrar('venda')">💰</button>
<button onclick="mostrar('agenda')">📅</button>

</nav>

</div>

<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || []
let vendas = JSON.parse(localStorage.getItem("vendas")) || []
let agenda = JSON.parse(localStorage.getItem("agenda")) || []

const clientesDiv = document.getElementById("clientes")
const agendaDiv = document.getElementById("agenda")

function entrar(){

document.getElementById("inicio").classList.add("hidden")
document.getElementById("menu").classList.remove("hidden")

pedirPermissao()

mostrar("dashboard")

}

function mostrar(tela){

dashboard.classList.add("hidden")
clientesDiv.classList.add("hidden")
venda.classList.add("hidden")
agendaDiv.classList.add("hidden")

if(tela==="dashboard") dashboard.classList.remove("hidden")
if(tela==="clientes") clientesDiv.classList.remove("hidden")
if(tela==="venda") venda.classList.remove("hidden")
if(tela==="agenda") agendaDiv.classList.remove("hidden")

render()

}

function render(){

renderDashboard()
renderClientes()
renderVenda()
renderAgenda()

}

function renderDashboard(){

let html=`<h2>Dashboard</h2>

<input placeholder="Buscar cliente" oninput="buscar(this.value)">
`

vendas.forEach((v,i)=>{

let s=v.status || "pendente"

html+=`

<div class="card">

<span class="status ${s}"></span>

<b>${v.cliente}</b>

<br>

${v.produto} - R$ ${v.valor}

<br>

Instalação: ${v.instalacao || "Não agendado"}

<br>

<select onchange="mudarStatus(${i},this.value)">

<option value="pendente" ${s==="pendente"?"selected":""}>Pendente</option>
<option value="instalado" ${s==="instalado"?"selected":""}>Instalado</option>
<option value="nao" ${s==="nao"?"selected":""}>Não instalado</option>

</select>

</div>
`

})

dashboard.innerHTML = html

}

function mudarStatus(i,s){

vendas[i].status=s

localStorage.setItem("vendas",JSON.stringify(vendas))

renderDashboard()

}

function renderClientes(){

let html=`<h2>Clientes</h2>

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="cep" placeholder="CEP">
<input id="endereco" placeholder="Endereço">

<button class="salvar" onclick="salvarCliente()">Salvar Cliente</button>
`

clientes.forEach((c,i)=>{

html+=`

<div class="card">

<b>${c.nome}</b>

<br>

${c.telefone}

<button class="excluir" onclick="excluirCliente(${i})">Excluir</button>

</div>
`
})

clientesDiv.innerHTML = html

}

function salvarCliente(){

let c={

nome:nome.value,
telefone:telefone.value,
cep:cep.value,
endereco:endereco.value

}

clientes.push(c)

localStorage.setItem("clientes",JSON.stringify(clientes))

renderClientes()

}

function excluirCliente(i){

let nome = clientes[i].nome

clientes.splice(i,1)

vendas = vendas.filter(v => v.cliente !== nome)

localStorage.setItem("clientes",JSON.stringify(clientes))
localStorage.setItem("vendas",JSON.stringify(vendas))

render()

}

function renderVenda(){

let html=`<h2>Nova Venda</h2>

<select id="clienteSelect">
${clientes.map(c=>`<option>${c.nome}</option>`)}
</select>

<select id="produto">
<option>Internet</option>
<option>Móvel</option>
<option>TV</option>
</select>

<input id="quantidade" placeholder="Quantidade">

<input id="valor" placeholder="Valor">

<label>Data instalação</label>
<input type="date" id="dataInstalacao">

<select id="status">
<option value="pendente">Pendente</option>
<option value="instalado">Instalado</option>
<option value="nao">Não instalado</option>
</select>

<button class="salvar" onclick="salvarVenda()">Salvar Venda</button>
`

venda.innerHTML = html

}

function salvarVenda(){

let v={

cliente:clienteSelect.value,
produto:produto.value,
quantidade:quantidade.value,
valor:valor.value,
instalacao:dataInstalacao.value || "",
status:status.value

}

vendas.push(v)

localStorage.setItem("vendas",JSON.stringify(vendas))

renderDashboard()

}

function renderAgenda(){

let html=`<h2>Agenda</h2>

<input type="date" id="dataAgenda">
<input id="textoAgenda" placeholder="Anotação">

<button class="salvar" onclick="salvarAgenda()">Salvar</button>
`

agenda.forEach(a=>{

html+=`

<div class="card">

<b>${a.data}</b>

<br>

${a.texto}

</div>
`
})

agendaDiv.innerHTML = html

}

function salvarAgenda(){

let a={
data:dataAgenda.value,
texto:textoAgenda.value
}

agenda.push(a)

localStorage.setItem("agenda",JSON.stringify(agenda))

renderAgenda()

}

function buscar(t){

t = t.toLowerCase()

let filtrado = vendas.filter(v => v.cliente.toLowerCase().includes(t))

let html="<h2>Dashboard</h2>"

filtrado.forEach(v=>{

html+=`

<div class="card">

<b>${v.cliente}</b>

<br>

${v.produto} - R$ ${v.valor}

</div>
`
})

dashboard.innerHTML = html

}

function pedirPermissao(){

if("Notification" in window){

if(Notification.permission !== "granted"){

Notification.requestPermission()

}

}

}

function verificarNotificacao(){

let hoje=new Date().toISOString().split("T")[0]

vendas.forEach(v=>{

if(v.instalacao===hoje){

if(Notification.permission==="granted"){

new Notification("Instalação hoje",{

body:"Cliente: "+v.cliente

})

}

}

})

}

setInterval(verificarNotificacao,60000)

render()

</script>

</body>
</html>

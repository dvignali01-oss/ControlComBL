<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ControlComBL | Pro Intelligence</title>
    
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">

    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --primary: #8b5cf6;
            --primary-stop: #d946ef;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Cores sofisticadas para os produtos */
            --color-tv: rgba(59, 130, 246, 0.15);
            --color-int: rgba(16, 185, 129, 0.15);
            --color-mov: rgba(245, 158, 11, 0.15);
            --color-fix: rgba(239, 68, 68, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 40px;
        }

        .header { 
            padding: 30px 20px; 
            text-align: center; 
            background: linear-gradient(180deg, rgba(139, 92, 246, 0.1) 0%, var(--bg) 100%); 
        }

        .tela { display: none; padding: 0 20px; max-width: 600px; margin: auto; animation: fadeIn 0.4s ease; }
        .ativa { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            padding: 20px; 
            border-radius: 24px; 
            margin-bottom: 15px; 
        }

        /* Grid de Dash */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 20px; cursor: pointer; text-align: left; transition: 0.2s; }
        .stat-card:active { transform: scale(0.96); }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; display: block; }
        .stat-value { font-size: 22px; font-weight: 800; }

        /* Estilização dos Produtos no Cadastro */
        .prod-container {
            display: grid;
            grid-template-columns: 1fr 70px 90px;
            gap: 10px;
            align-items: center;
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .prod-label { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; }
        .prod-tv { background: var(--color-tv); color: #60a5fa; }
        .prod-int { background: var(--color-int); color: #34d399; }
        .prod-mov { background: var(--color-mov); color: #fbbf24; }
        .prod-fix { background: var(--color-fix); color: #f87171; }

        input, select, textarea { 
            width: 100%; background: #0f172a; border: 1px solid var(--border); 
            padding: 14px; border-radius: 12px; color: var(--text); font-family: inherit;
        }

        .btn { 
            width: 100%; padding: 18px; border: none; border-radius: 16px; 
            font-size: 16px; font-weight: 700; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; gap: 10px; 
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-stop)); color: white; }
        .btn-secondary { background: var(--border); color: var(--text); margin-top: 10px; }
        .btn-whatsapp { background: #25d366; color: white; margin-top: 15px; }

        .progress-container { background: #0f172a; height: 10px; border-radius: 10px; margin: 10px 0 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 1s; }

        #toast { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            background: var(--card); padding: 12px 25px; border-radius: 50px; 
            display: none; z-index: 1000; border: 1px solid var(--primary);
        }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="header">
    <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
        <div style="background: linear-gradient(135deg, var(--primary), var(--primary-stop)); padding:8px; border-radius:12px;">
            <i data-lucide="layers" color="white"></i>
        </div>
        <h1 style="margin:0; font-size: 24px;">ControlCom<span style="color:var(--primary)">BL</span></h1>
    </div>
</div>

<div id="menu" class="tela ativa">
    <div class="stat-grid">
        <div class="stat-card" onclick="abrir('dashboard')"><i data-lucide="bar-chart-3" color="var(--primary)"></i><span class="stat-label" style="margin-top:10px">Painel</span></div>
        <div class="stat-card" onclick="abrir('cadastro')"><i data-lucide="plus-circle" color="var(--success)"></i><span class="stat-label" style="margin-top:10px">Venda</span></div>
        <div class="stat-card" onclick="abrir('clientes')"><i data-lucide="users" color="var(--warning)"></i><span class="stat-label" style="margin-top:10px">Carteira</span></div>
        <div class="stat-card" onclick="abrir('comissao')"><i data-lucide="wallet" color="#d946ef"></i><span class="stat-label" style="margin-top:10px">Ganhos</span></div>
    </div>
</div>

<div id="dashboard" class="tela">
    <h2>Performance</h2>
    <div class="stat-grid">
        <div class="stat-card"><span class="stat-label">Total</span><span id="dash-total" class="stat-value">0</span></div>
        <div class="stat-card"><span class="stat-label">Instalados</span><span id="dash-inst" class="stat-value" style="color:var(--success)">0</span></div>
    </div>
    <div class="card">
        <span class="stat-label">Comissão Garantida</span>
        <span id="dash-real" class="stat-value" style="color:var(--success); font-size: 32px;">R$ 0.00</span>
    </div>
    <button class="btn btn-whatsapp" onclick="enviarRelatorioWhatsApp()"><i data-lucide="send"></i> Relatório Diário</button>
    <button class="btn btn-secondary" onclick="abrir('menu')">Voltar</button>
</div>

<div id="cadastro" class="tela">
    <h2>Nova Venda</h2>
    <div class="card">
        <label>Cliente</label>
        <input id="nome" placeholder="Nome completo" style="margin-bottom:15px">
        
        <label style="margin-bottom:10px; display:block">Produtos</label>
        
        <div class="prod-container prod-tv">
            <div class="prod-label"><i data-lucide="tv"></i> TV</div>
            <input type="number" id="tvQtd" placeholder="Qtd" oninput="calcVenda()">
            <input type="number" id="tvVal" placeholder="R$" oninput="calcVenda()">
        </div>

        <div class="prod-container prod-int">
            <div class="prod-label"><i data-lucide="wifi"></i> NET</div>
            <input type="number" id="intQtd" placeholder="Qtd" oninput="calcVenda()">
            <input type="number" id="intVal" placeholder="R$" oninput="calcVenda()">
        </div>

        <div class="prod-container prod-mov">
            <div class="prod-label"><i data-lucide="smartphone"></i> MÓVEL</div>
            <input type="number" id="movQtd" placeholder="Qtd" oninput="calcVenda()">
            <input type="number" id="movVal" placeholder="R$" oninput="calcVenda()">
        </div>

        <div class="prod-container prod-fix">
            <div class="prod-label"><i data-lucide="phone"></i> FIXO</div>
            <input type="number" id="fixQtd" placeholder="Qtd" oninput="calcVenda()">
            <input type="number" id="fixVal" placeholder="R$" oninput="calcVenda()">
        </div>

        <div style="text-align:right; font-weight:800; font-size:18px; margin: 15px 0;">
            Total: <span id="vendaTotalText" style="color:var(--primary)">R$ 0.00</span>
        </div>

        <label>Status</label>
        <select id="status">
            <option value="pendente">Pendente</option>
            <option value="instalado">Instalado</option>
        </select>

        <button class="btn btn-primary" style="margin-top:20px;" onclick="salvar()">Salvar Venda</button>
    </div>
    <button class="btn btn-secondary" onclick="abrir('menu')">Cancelar</button>
</div>

<div id="clientes" class="tela">
    <h2>Minha Carteira</h2>
    <div id="listaClientes"></div>
    <button class="btn btn-secondary" onclick="abrir('menu')">Voltar</button>
</div>

<div id="comissao" class="tela">
    <h2>Metas e Ganhos</h2>
    <div class="card">
        <span class="stat-label">Progresso Meta (15 inst.)</span>
        <div class="progress-container"><div id="progressoQtd" class="progress-bar"></div></div>
        <span id="totalComissao" style="font-size:36px; font-weight:800; color: var(--success);">R$ 0.00</span>
    </div>
    
    <div class="card">
        <h3 style="margin-top:0"><i data-lucide="calculator"></i> Simulador Rápido</h3>
        <input id="valorSim" type="number" placeholder="Valor da Venda R$" onkeyup="simular()">
        <div id="resultadoSim" style="margin-top:15px"></div>
    </div>
    <button class="btn btn-secondary" onclick="abrir('menu')">Voltar</button>
</div>

<script>
    let clientes = JSON.parse(localStorage.getItem('controlComData')) || [];
    let valorVenda = 0;

    function abrir(id){
        document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
        document.getElementById(id).classList.add("ativa");
        if(id==="dashboard") renderDash();
        if(id==="clientes") renderClientes();
        if(id==="comissao") renderComissao();
        lucide.createIcons();
    }

    function calcVenda(){
        const getV = (id) => (parseFloat(document.getElementById(id+'Qtd').value)||0) * (parseFloat(document.getElementById(id+'Val').value)||0);
        valorVenda = getV('tv') + getV('int') + getV('mov') + getV('fix');
        document.getElementById('vendaTotalText').innerText = `R$ ${valorVenda.toFixed(2)}`;
    }

    function salvar(){
        const n = document.getElementById('nome').value;
        if(!n || valorVenda <= 0) return alert("Preencha os dados!");
        clientes.push({ id: Date.now(), nome: n, valor: valorVenda, status: document.getElementById('status').value });
        localStorage.setItem('controlComData', JSON.stringify(clientes));
        alert("Venda salva!"); abrir('menu');
    }

    function renderClientes(){
        let h = "";
        clientes.forEach((c, i) => {
            h += `<div class="card">
                <div style="font-weight:700">${c.nome}</div>
                <div style="color:var(--primary)">R$ ${c.valor.toFixed(2)} - <b>${c.status}</b></div>
                <button onclick="excluir(${i})" style="background:none; border:none; color:var(--danger); margin-top:10px">Excluir</button>
            </div>`;
        });
        document.getElementById('listaClientes').innerHTML = h;
    }

    function excluir(i){ clientes.splice(i, 1); localStorage.setItem('controlComData', JSON.stringify(clientes)); renderClientes(); }

    function calcCom(v, qtd){
        const f = v<=90?0:v<120?1:v<150?2:v<180?3:v<200?4:5;
        const t = qtd>=15?[20,28.8,45,67.5,93.75]:qtd>=12?[15,21.6,33.75,50.63,70.31]:qtd>=10?[12,17.28,27,40.5,56.25]:qtd>=8?[8,11.52,18,27,37.5]:[0,0,0,0,0];
        return 4 + (f===0?0:t[f-1]);
    }

    function renderComissao(){
        const inst = clientes.filter(c => c.status === "instalado");
        let total = 0; inst.forEach(c => total += calcCom(c.valor, inst.length));
        document.getElementById('totalComissao').innerText = `R$ ${total.toFixed(2)}`;
        document.getElementById('progressoQtd').style.width = `${(inst.length/15)*100}%`;
    }

    function simular(){
        const v = parseFloat(document.getElementById('valorSim').value);
        if(!v) return;
        let h = "";
        [8, 10, 15].forEach(n => {
            h += `<div style="font-size:13px; margin-bottom:5px">Com ${n} inst: <b>R$ ${calcCom(v, n).toFixed(2)}</b></div>`;
        });
        document.getElementById('resultadoSim').innerHTML = h;
    }

    function renderDash(){
        const inst = clientes.filter(c => c.status === "instalado");
        let total = 0; inst.forEach(c => total += calcCom(c.valor, inst.length));
        document.getElementById('dash-total').innerText = clientes.length;
        document.getElementById('dash-inst').innerText = inst.length;
        document.getElementById('dash-real').innerText = `R$ ${total.toFixed(2)}`;
    }

    function enviarRelatorioWhatsApp() {
        const inst = clientes.filter(c => c.status === "instalado");
        let total = 0; inst.forEach(c => total += calcCom(c.valor, inst.length));
        const msg = window.encodeURIComponent(`*RELATÓRIO CONTROLCOM*\nVendas: ${clientes.length}\nInstalados: ${inst.length}\nComissão: R$ ${total.toFixed(2)}`);
        window.open(`https://api.whatsapp.com/send?text=${msg}`);
    }

    lucide.createIcons();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlComBL</title>
    <style>
        body{ margin:0; font-family:-apple-system,BlinkMacSystemFont; background:#1c1c1e; color:#fff; }
        .tela{ display:none; padding:20px; max-width:500px; margin:auto; }
        .ativa{ display:block; }
        .card{ background:#2c2c2e; padding:20px; border-radius:14px; margin-bottom:15px; }
        h1,h2{ text-align:center; }
        button{ width:100%; padding:14px; margin-top:10px; border:none; border-radius:12px; font-size:17px; background:#0a84ff; color:white; cursor:pointer; }
        input,select{ width:100%; padding:12px; margin-top:10px; border-radius:10px; border:none; font-size:16px; box-sizing: border-box; }
        .status{ width:14px; height:14px; border-radius:50%; display:inline-block; margin-right:8px; }
        .instalado{background:#30d158;}
        .pendente{background:#ffd60a;}
        .nao{background:#ff453a;}
        .barra{ width:100%; height:18px; background:#444; border-radius:10px; overflow:hidden; margin-top:10px; }
        #progresso{ height:18px; background:#30d158; width:0%; transition: 0.3s; }
        .popup{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#30d158; padding:12px 20px; border-radius:10px; display:none; z-index: 100; }
        hr { border: 0; border-top: 1px solid #444; margin: 15px 0; }
    </style>
</head>
<body>

<div id="popup" class="popup"></div>

<div id="entrada" class="tela ativa">
    <h1>ControlComBL</h1>
    <div class="card">
        <p style="text-align:center">Sistema de controle de vendas</p>
        <button onclick="abrir('menu')">Entrar no app</button>
    </div>
</div>

<div id="menu" class="tela">
    <h2>Menu</h2>
    <div class="card">
        <button onclick="abrir('dashboard')">📊 Dashboard</button>
        <button onclick="abrir('cadastro')">👤 Cadastrar Cliente</button>
        <button onclick="abrir('clientes')">📋 Clientes</button>
        <button onclick="abrir('vendas')">💳 Vendas</button>
        <button onclick="abrir('comissao')">💰 Comissões</button>
    </div>
    <button style="background:#ff453a" onclick="abrir('entrada')">⬅ Sair</button>
</div>

<div id="dashboard" class="tela">
    <h2>Dashboard</h2>
    <div class="card" id="dash"></div>
    <button onclick="abrir('menu')">⬅ Menu</button>
</div>

<div id="cadastro" class="tela">
    <h2>Novo Cliente</h2>
    <div class="card">
        <input id="nome" placeholder="Nome">
        <input id="telefone" placeholder="Telefone">
        <input id="valor" type="number" placeholder="Valor da venda">
        <select id="status">
            <option value="pendente">Pendente</option>
            <option value="instalado">Instalado</option>
            <option value="nao">Não instalado</option>
        </select>
        <button onclick="salvar()">Salvar</button>
    </div>
    <button onclick="abrir('menu')">⬅ Menu</button>
</div>

<div id="clientes" class="tela">
    <h2>Clientes</h2>
    <input id="busca" placeholder="Buscar cliente" onkeyup="buscar()">
    <div class="card" id="listaClientes"></div>
    <button onclick="abrir('menu')">⬅ Menu</button>
</div>

<div id="vendas" class="tela">
    <h2>Vendas</h2>
    <div class="card" id="listaVendas"></div>
    <button onclick="abrir('menu')">⬅ Menu</button>
</div>

<div id="comissao" class="tela">
    <h2>Comissões</h2>
    <div class="card">
        Instalações: <span id="inst">0</span><br>
        Comissão total: R$ <span id="total">0.00</span>
    </div>
    <div class="card">
        Meta mensal: <span id="metaTxt">0 / 15</span>
        <div class="barra"><div id="progresso"></div></div>
    </div>
    <div class="card">
        <h3>Detalhes</h3>
        <div id="detalhes"></div>
    </div>
    <div class="card">
        <h3>Simulador</h3>
        <input id="valorSim" type="number" placeholder="Valor da venda">
        <button onclick="simular()">Simular</button>
        <div id="resultadoSim" style="margin-top:10px"></div>
    </div>
    <button onclick="abrir('menu')">⬅ Menu</button>
</div>

<script>
let clientes = [];

function abrir(id){
    document.querySelectorAll(".tela").forEach(t=>t.classList.remove("ativa"));
    document.getElementById(id).classList.add("ativa");
    
    if(id==="clientes") renderClientes();
    if(id==="dashboard") renderDash();
    if(id==="vendas") renderVendas();
    if(id==="comissao") renderComissao();
}

function salvar(){
    const nomeInput = document.getElementById('nome');
    const telInput = document.getElementById('telefone');
    const valorInput = document.getElementById('valor');
    const statusInput = document.getElementById('status');

    if(!nomeInput.value || !valorInput.value) {
        alert("Preencha nome e valor!");
        return;
    }

    clientes.push({
        nome: nomeInput.value,
        telefone: telInput.value,
        valor: parseFloat(valorInput.value),
        status: statusInput.value
    });

    mostrarPopup("Cliente cadastrado!");
    nomeInput.value = "";
    telInput.value = "";
    valorInput.value = "";
}

function renderClientes(){
    let html = "";
    clientes.forEach((c, i) => {
        html += `
        <div>
            <span class="status ${c.status}"></span>
            <b>${c.nome}</b><br>
            📞 ${c.telefone}<br>
            💰 R$ ${c.valor.toFixed(2)}
            <select onchange="mudarStatus(${i}, this.value)">
                <option ${c.status==="pendente"?"selected":""} value="pendente">Pendente</option>
                <option ${c.status==="instalado"?"selected":""} value="instalado">Instalado</option>
                <option ${c.status==="nao"?"selected":""} value="nao">Não instalado</option>
            </select>
            <button style="background:#ff453a; padding:8px; font-size:14px" onclick="excluir(${i})">Excluir</button>
            <hr>
        </div>`;
    });
    document.getElementById('listaClientes').innerHTML = html || "Nenhum cliente cadastrado.";
}

function renderVendas(){
    let html = "";
    clientes.forEach(c => {
        html += `<b>${c.nome}</b><br>Valor: R$ ${c.valor.toFixed(2)}<br>Status: ${c.status}<hr>`;
    });
    document.getElementById('listaVendas').innerHTML = html || "Sem vendas registradas.";
}

function mudarStatus(i, s){
    clientes[i].status = s;
    renderClientes();
}

function excluir(i){
    if(confirm("Deseja excluir este cliente?")) {
        clientes.splice(i, 1);
        renderClientes();
    }
}

function buscar(){
    let termo = normalizar(document.getElementById('busca').value);
    let filtrados = clientes.filter(c => 
        normalizar(c.nome).includes(termo) || normalizar(c.telefone).includes(termo)
    );
    
    let html = "";
    filtrados.forEach((c, i) => {
        html += `<div><span class="status ${c.status}"></span> ${c.nome} - R$ ${c.valor}</div><hr>`;
    });
    document.getElementById('listaClientes').innerHTML = html;
}

function normalizar(t){
    return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function renderDash(){
    let total = clientes.length;
    let instalados = clientes.filter(c=>c.status==="instalado").length;
    document.getElementById('dash').innerHTML = `
        Clientes cadastrados: ${total}<br>
        Instalações concluídas: ${instalados}
    `;
}

function faixa(v){
    if(v <= 90) return 0;
    if(v < 120) return 1;
    if(v < 150) return 2;
    if(v < 180) return 3;
    if(v < 200) return 4;
    return 5;
}

function tabela(qtdInstalacoes){
    if(qtdInstalacoes >= 15) return [20, 28.8, 45, 67.5, 93.75];
    if(qtdInstalacoes >= 12) return [15, 21.6, 33.75, 50.63, 70.31];
    if(qtdInstalacoes >= 10) return [12, 17.28, 27, 40.5, 56.25];
    if(qtdInstalacoes >= 8)  return [8, 11.52, 18, 27, 37.5];
    return [0, 0, 0, 0, 0];
}

function renderComissao(){
    let instaladas = clientes.filter(c => c.status === "instalado");
    let qtd = instaladas.length;
    let tab = tabela(qtd);
    let totalCom = 0;
    let html = "";

    instaladas.forEach(c => {
        let f = faixa(c.valor);
        let com = (f === 0 || tab[f-1] === undefined) ? 4 : tab[f-1];
        totalCom += com;
        html += `${c.nome} → R$ ${com.toFixed(2)}<br>`;
    });

    document.getElementById('inst').innerText = qtd;
    document.getElementById('total').innerText = totalCom.toFixed(2);
    document.getElementById('detalhes').innerHTML = html || "Nenhuma instalação concluída.";
    
    let metaObjetivo = 15;
    document.getElementById('metaTxt').innerText = `${qtd} / ${metaObjetivo}`;
    document.getElementById('progresso').style.width = Math.min((qtd / metaObjetivo * 100), 100) + "%";
}

function simular(){
    let vSim = parseFloat(document.getElementById('valorSim').value);
    if(isNaN(vSim)) return;
    let niveis = [8, 10, 12, 15];
    let html = "";

    niveis.forEach(n => {
        let tab = tabela(n);
        let f = faixa(vSim);
        let com = (f === 0 || tab[f-1] === undefined) ? 4 : tab[f-1];
        html += `Com ${n} inst. → <b>R$ ${com.toFixed(2)}</b><br>`;
    });
    document.getElementById('resultadoSim').innerHTML = html;
}

function mostrarPopup(msg){
    const el = document.getElementById('popup');
    el.innerText = msg;
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 2500);
}
</script>

</body>
</html>

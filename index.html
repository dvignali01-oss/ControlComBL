<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ControlComBL</title>

<style>

body{
margin:0;
background:#020617;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
display:flex;
justify-content:center;
color:white;
}

.app{
width:100%;
max-width:420px;
min-height:100vh;
background:#020617;
}

header{
text-align:center;
padding:20px;
font-size:24px;
font-weight:600;
border-bottom:1px solid #1e293b;
}

.container{
padding:20px;
}

button{
width:100%;
padding:16px;
margin-bottom:10px;
border:none;
border-radius:14px;
font-size:18px;
font-weight:600;
}

.menuBtn{
background:#1e293b;
color:white;
}

.salvar{
background:#22c55e;
color:white;
}

.voltar{
background:#334155;
color:white;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:18px;
border-radius:16px;
margin-bottom:12px;
}

input,select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-bottom:10px;
background:#1e293b;
color:white;
font-size:16px;
}

.status{
width:10px;
height:10px;
border-radius:50%;
display:inline-block;
margin-right:6px;
}

.instalado{background:#22c55e}
.pendente{background:#eab308}
.nao{background:#ef4444}

.hidden{
display:none;
}

.logo{
text-align:center;
font-size:32px;
margin-top:100px;
margin-bottom:40px;
}

</style>

</head>

<body>

<div class="app">

<header>ControlComBL</header>

<div class="container">

<!-- TELA INICIAL -->

<div id="inicio">

<div class="logo">ControlComBL</div>

<button class="salvar" onclick="abrirMenu()">Entrar no App</button>

</div>

<!-- MENU -->

<div id="menu" class="hidden">

<button class="menuBtn" onclick="abrirTela('dashboard')">🏠 Dashboard</button>

<button class="menuBtn" onclick="abrirTela('clientes')">👤 Clientes</button>

<button class="menuBtn" onclick="abrirTela('venda')">💰 Nova Venda</button>

<button class="menuBtn" onclick="abrirTela('agenda')">📅 Agenda</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="hidden"></div>

<!-- CLIENTES -->

<div id="clientes" class="hidden"></div>

<!-- VENDA -->

<div id="venda" class="hidden"></div>

<!-- AGENDA -->

<div id="agenda" class="hidden"></div>

</div>

</div>

<script>

let clientes=JSON.parse(localStorage.getItem("clientes"))||[]
let vendas=JSON.parse(localStorage.getItem("vendas"))||[]
let agenda=JSON.parse(localStorage.getItem("agenda"))||[]

function abrirMenu(){

inicio.classList.add("hidden")
menu.classList.remove("hidden")

}

function voltarMenu(){

dashboard.classList.add("hidden")
clientesDiv.classList.add("hidden")
venda.classList.add("hidden")
agendaDiv.classList.add("hidden")

menu.classList.remove("hidden")

}

function abrirTela(t){

menu.classList.add("hidden")

if(t==="dashboard"){

renderDashboard()
dashboard.classList.remove("hidden")

}

if(t==="clientes"){

renderClientes()
clientesDiv.classList.remove("hidden")

}

if(t==="venda"){

renderVenda()
venda.classList.remove("hidden")

}

if(t==="agenda"){

renderAgenda()
agendaDiv.classList.remove("hidden")

}

}

const clientesDiv=document.getElementById("clientes")
const agendaDiv=document.getElementById("agenda")

function renderDashboard(){

let html=`<button class="voltar" onclick="voltarMenu()">⬅ Menu</button>

<h2>Dashboard</h2>`

vendas.forEach((v,i)=>{

let s=v.status||"pendente"

html+=`

<div class="card">

<span class="status ${s}"></span>

<b>${v.cliente}</b>

<br>

${v.produto} - R$ ${v.valor}

<br>

Instalação: ${v.instalacao||"Não agendado"}

<br>

<select onchange="mudarStatus(${i},this.value)">

<option value="pendente" ${s=="pendente"?"selected":""}>Pendente</option>
<option value="instalado" ${s=="instalado"?"selected":""}>Instalado</option>
<option value="nao" ${s=="nao"?"selected":""}>Não instalado</option>

</select>

</div>
`

})

dashboard.innerHTML=html

}

function mudarStatus(i,s){

vendas[i].status=s

localStorage.setItem("vendas",JSON.stringify(vendas))

renderDashboard()

}

function renderClientes(){

let html=`<button class="voltar" onclick="voltarMenu()">⬅ Menu</button>

<h2>Clientes</h2>

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="cep" placeholder="CEP">
<input id="endereco" placeholder="Endereço">

<button class="salvar" onclick="salvarCliente()">Salvar Cliente</button>
`

clientes.forEach((c,i)=>{

html+=`

<div class="card">

<b>${c.nome}</b>

<br>

${c.telefone}

<button class="salvar" onclick="excluirCliente(${i})">Excluir</button>

</div>
`

})

clientesDiv.innerHTML=html

}

function salvarCliente(){

let c={

nome:nome.value,
telefone:telefone.value,
cep:cep.value,
endereco:endereco.value

}

clientes.push(c)

localStorage.setItem("clientes",JSON.stringify(clientes))

renderClientes()

}

function excluirCliente(i){

let nome=clientes[i].nome

clientes.splice(i,1)

vendas=vendas.filter(v=>v.cliente!==nome)

localStorage.setItem("clientes",JSON.stringify(clientes))
localStorage.setItem("vendas",JSON.stringify(vendas))

renderClientes()

}

function renderVenda(){

let html=`<button class="voltar" onclick="voltarMenu()">⬅ Menu</button>

<h2>Nova Venda</h2>

<select id="clienteSelect">

${clientes.map(c=>`<option>${c.nome}</option>`)}

</select>

<select id="produto">

<option>Internet</option>
<option>Móvel</option>
<option>TV</option>

</select>

<input id="quantidade" placeholder="Quantidade">

<input id="valor" placeholder="Valor">

<input type="date" id="dataInstalacao">

<select id="status">

<option value="pendente">Pendente</option>
<option value="instalado">Instalado</option>
<option value="nao">Não instalado</option>

</select>

<button class="salvar" onclick="salvarVenda()">Salvar Venda</button>
`

venda.innerHTML=html

}

function salvarVenda(){

let v={

cliente:clienteSelect.value,
produto:produto.value,
quantidade:quantidade.value,
valor:valor.value,
instalacao:dataInstalacao.value,
status:status.value

}

vendas.push(v)

localStorage.setItem("vendas",JSON.stringify(vendas))

alert("Venda salva")

}

function renderAgenda(){

let html=`<button class="voltar" onclick="voltarMenu()">⬅ Menu</button>

<h2>Agenda</h2>

<input type="date" id="dataAgenda">

<input id="textoAgenda" placeholder="Anotação">

<button class="salvar" onclick="salvarAgenda()">Salvar</button>
`

agenda.forEach(a=>{

html+=`

<div class="card">

<b>${a.data}</b>

<br>

${a.texto}

</div>
`

})

agendaDiv.innerHTML=html

}

function salvarAgenda(){

let a={

data:dataAgenda.value,
texto:textoAgenda.value

}

agenda.push(a)

localStorage.setItem("agenda",JSON.stringify(agenda))

renderAgenda()

}

</script>

</body>
</html>

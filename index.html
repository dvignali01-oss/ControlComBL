<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ControlComBL</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:#e2e8f0;
margin:0;
}

header{
background:#020617;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
letter-spacing:1px;
}

nav{
display:flex;
justify-content:space-around;
background:#1e293b;
padding:10px;
}

nav button{
background:#334155;
border:none;
color:white;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

input,select,textarea{

width:100%;
padding:10px;
margin-top:5px;
margin-bottom:12px;
border-radius:6px;
border:none;
background:#1e293b;
color:white;

}

button.salvar{

background:#22c55e;
color:white;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
width:100%;

}

.card{

background:#1e293b;
padding:15px;
margin-top:12px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);

}

.hidden{
display:none;
}

.status{
font-size:20px;
margin-right:6px;
}

.titulo{
margin-top:0;
}

</style>
</head>

<body>

<header>ControlComBL</header>

<nav>

<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('clientes')">Clientes</button>
<button onclick="mostrar('venda')">Nova Venda</button>
<button onclick="mostrar('agenda')">Agenda</button>

</nav>

<div class="container">

<!-- DASHBOARD -->

<div id="dashboard">

<h2 class="titulo">Vendas</h2>

<input placeholder="Buscar cliente ou telefone"
oninput="buscar(this.value)">

<div id="listaVendas"></div>

</div>

<!-- CLIENTES -->

<div id="clientes" class="hidden">

<h2>Cadastro de Clientes</h2>

<input id="cNome" placeholder="Nome">

<input id="cTelefone" placeholder="Telefone">

<input id="cCep" placeholder="CEP">

<input id="cEndereco" placeholder="Endereço">

<button class="salvar" onclick="salvarCliente()">Salvar Cliente</button>

<div id="listaClientes"></div>

</div>

<!-- NOVA VENDA -->

<div id="venda" class="hidden">

<h2>Nova Venda</h2>

<select id="clienteSelect"></select>

<select id="produto">
<option>Internet</option>
<option>Móvel</option>
<option>TV</option>
</select>

<input id="quantidade" type="number" placeholder="Quantidade">

<input id="valor" type="number" placeholder="Valor">

<label>Data da venda</label>
<input id="dataVenda" type="date">

<label>Data da instalação</label>
<input id="dataInstalacao" type="date">

<button class="salvar" onclick="salvarVenda()">Salvar Venda</button>

</div>

<!-- AGENDA -->

<div id="agenda" class="hidden">

<h2>Agenda</h2>

<input id="dataNota" type="date">

<textarea id="nota" placeholder="Anotação sobre vendas ou clientes"></textarea>

<button class="salvar" onclick="salvarNota()">Salvar Anotação</button>

<div id="listaNotas"></div>

</div>

</div>

<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || []
let vendas = JSON.parse(localStorage.getItem("vendas")) || []
let notas = JSON.parse(localStorage.getItem("notas")) || []

function mostrar(tela){

document.getElementById("dashboard").classList.add("hidden")
document.getElementById("clientes").classList.add("hidden")
document.getElementById("venda").classList.add("hidden")
document.getElementById("agenda").classList.add("hidden")

document.getElementById(tela).classList.remove("hidden")

}

function salvarCliente(){

let cliente={

nome:cNome.value,
telefone:cTelefone.value,
cep:cCep.value,
endereco:cEndereco.value

}

clientes.push(cliente)

localStorage.setItem("clientes",JSON.stringify(clientes))

carregarClientes()

alert("Cliente cadastrado")

}

function carregarClientes(){

let lista=document.getElementById("listaClientes")

let select=document.getElementById("clienteSelect")

lista.innerHTML=""
select.innerHTML=""

clientes.forEach((c,i)=>{

lista.innerHTML+=`

<div class="card">

<b>${c.nome}</b><br>

${c.telefone}<br>

${c.endereco}

</div>

`

select.innerHTML+=`<option value="${i}">${c.nome}</option>`

})

}

function salvarVenda(){

let i=clienteSelect.value

let venda={

cliente:clientes[i].nome,
telefone:clientes[i].telefone,
produto:produto.value,
quantidade:quantidade.value,
valor:valor.value,
dataVenda:dataVenda.value,
dataInstalacao:dataInstalacao.value,
status:"pendente"

}

vendas.push(venda)

localStorage.setItem("vendas",JSON.stringify(vendas))

mostrarVendas()

alert("Venda salva")

}

function corStatus(s){

if(s=="instalado") return "🟢"
if(s=="nao") return "🔴"
return "🟡"

}

function mostrarVendas(lista=vendas){

let div=document.getElementById("listaVendas")

div.innerHTML=""

lista.forEach((v,i)=>{

div.innerHTML+=`

<div class="card">

<span class="status">${corStatus(v.status)}</span>

<b>${v.cliente}</b><br>

${v.produto} x${v.quantidade}<br>

Valor: R$ ${v.valor}<br>

Instalação: ${v.dataInstalacao}<br>

<select onchange="mudarStatus(${i},this.value)">

<option value="pendente" ${v.status=="pendente"?"selected":""}>Pendente</option>

<option value="instalado" ${v.status=="instalado"?"selected":""}>Instalado</option>

<option value="nao" ${v.status=="nao"?"selected":""}>Não instalado</option>

</select>

</div>

`

})

}

function mudarStatus(i,s){

vendas[i].status=s

localStorage.setItem("vendas",JSON.stringify(vendas))

mostrarVendas()

}

function normalizar(t){

return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")

}

function buscar(t){

let busca=normalizar(t)

let filtrado=vendas.filter(v=>

normalizar(v.cliente).includes(busca) ||

normalizar(v.telefone).includes(busca)

)

mostrarVendas(filtrado)

}

function salvarNota(){

let nota={

data:dataNota.value,
texto:nota.value

}

notas.push(nota)

localStorage.setItem("notas",JSON.stringify(notas))

mostrarNotas()

}

function mostrarNotas(){

let div=document.getElementById("listaNotas")

div.innerHTML=""

notas.forEach((n,i)=>{

div.innerHTML+=`

<div class="card">

<b>${n.data}</b><br>

${n.texto}<br>

<button onclick="excluirNota(${i})">Excluir</button>

</div>

`

})

}

function excluirNota(i){

notas.splice(i,1)

localStorage.setItem("notas",JSON.stringify(notas))

mostrarNotas()

}

carregarClientes()
mostrarVendas()
mostrarNotas()

</script>

</body>
</html>

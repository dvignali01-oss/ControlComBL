<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ControlComBL</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
display:flex;
justify-content:center;
}

.container{
width:390px;
min-height:100vh;
background:#020617;
padding:20px;
}

h1{
text-align:center;
font-size:26px;
margin-bottom:20px;
}

nav{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

nav button{
flex:1;
margin:5px;
padding:14px;
font-size:16px;
background:#1e293b;
color:white;
border:none;
border-radius:10px;
}

input,select{
width:100%;
padding:14px;
margin:6px 0;
border-radius:10px;
border:none;
font-size:16px;
}

button.salvar{
width:100%;
padding:16px;
background:#22c55e;
border:none;
border-radius:10px;
font-size:18px;
color:white;
margin-top:10px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

.status{
width:12px;
height:12px;
border-radius:50%;
display:inline-block;
margin-right:6px;
}

.instalado{background:#22c55e}
.pendente{background:#eab308}
.nao{background:#ef4444}

.excluir{
background:#ef4444;
border:none;
color:white;
padding:8px;
border-radius:6px;
margin-top:5px;
}

.busca{
padding:12px;
font-size:16px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>ControlComBL</h1>

<nav>
<button onclick="tela('dashboard')">Dashboard</button>
<button onclick="tela('clientes')">Clientes</button>
<button onclick="tela('venda')">Venda</button>
<button onclick="tela('agenda')">Agenda</button>
</nav>

<div id="dashboard"></div>
<div id="clientes" style="display:none"></div>
<div id="venda" style="display:none"></div>
<div id="agenda" style="display:none"></div>

</div>

<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || []
let vendas = JSON.parse(localStorage.getItem("vendas")) || []
let agenda = JSON.parse(localStorage.getItem("agenda")) || []

function tela(id){

document.getElementById("dashboard").style.display="none"
document.getElementById("clientes").style.display="none"
document.getElementById("venda").style.display="none"
document.getElementById("agenda").style.display="none"

document.getElementById(id).style.display="block"

render()

}

function render(){

renderClientes()
renderVenda()
renderDashboard()
renderAgenda()

}

function normalizar(txt){
return txt.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
}

function renderClientes(){

let html=`
<h2>Cadastro Cliente</h2>

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="cep" placeholder="CEP">
<input id="endereco" placeholder="Endereço">

<button class="salvar" onclick="salvarCliente()">Salvar</button>

<input class="busca" placeholder="Buscar cliente..." onkeyup="buscarCliente(this.value)">
<div id="listaClientes"></div>
`

document.getElementById("clientes").innerHTML=html

listarClientes(clientes)

}

function salvarCliente(){

let c={
nome:nome.value,
telefone:telefone.value,
cep:cep.value,
endereco:endereco.value
}

clientes.push(c)

localStorage.setItem("clientes",JSON.stringify(clientes))

render()

}

function listarClientes(lista){

let html=""

lista.forEach((c,i)=>{

html+=`
<div class="card">
<b>${c.nome}</b><br>
${c.telefone}

<br>
<button class="excluir" onclick="excluirCliente(${i})">Excluir</button>
</div>
`

})

document.getElementById("listaClientes").innerHTML=html

}

function buscarCliente(txt){

let t=normalizar(txt)

let filtrado=clientes.filter(c=>normalizar(c.nome).includes(t)||normalizar(c.telefone).includes(t))

listarClientes(filtrado)

}

function excluirCliente(index){

let nomeCliente=clientes[index].nome

clientes.splice(index,1)

vendas=vendas.filter(v=>v.cliente!=nomeCliente)

localStorage.setItem("clientes",JSON.stringify(clientes))
localStorage.setItem("vendas",JSON.stringify(vendas))

render()

}

function renderVenda(){

let html=`
<h2>Nova Venda</h2>

<select id="clienteSelect">
${clientes.map(c=>`<option>${c.nome}</option>`)}
</select>

<select id="produto">
<option>Internet</option>
<option>Móvel</option>
<option>TV</option>
</select>

<input id="quantidade" placeholder="Quantidade">

<input id="valor" placeholder="Valor">

<input type="date" id="dataVenda">

<input type="date" id="dataInstalacao">

<select id="status">
<option value="pendente">Pendente</option>
<option value="instalado">Instalado</option>
<option value="nao">Não instalado</option>
</select>

<button class="salvar" onclick="salvarVenda()">Salvar Venda</button>
`

document.getElementById("venda").innerHTML=html

}

function salvarVenda(){

let v={

cliente:clienteSelect.value,
produto:produto.value,
quantidade:quantidade.value,
valor:valor.value,
dataVenda:dataVenda.value,
instalacao:dataInstalacao.value,
status:status.value

}

vendas.push(v)

localStorage.setItem("vendas",JSON.stringify(vendas))

render()

}

function renderDashboard(){

let html="<h2>Dashboard</h2>"

vendas.forEach((v,i)=>{

let classe=v.status

html+=`
<div class="card">

<span class="status ${classe}"></span>

<b>${v.cliente}</b>

<br>

${v.produto} - R$ ${v.valor}

<br>

Instalação: ${v.instalacao}

<br>

<select onchange="alterarStatus(${i},this.value)">

<option value="pendente" ${v.status=="pendente"?"selected":""}>Pendente</option>
<option value="instalado" ${v.status=="instalado"?"selected":""}>Instalado</option>
<option value="nao" ${v.status=="nao"?"selected":""}>Não instalado</option>

</select>

</div>
`

})

document.getElementById("dashboard").innerHTML=html

}

function alterarStatus(i,s){

vendas[i].status=s

localStorage.setItem("vendas",JSON.stringify(vendas))

renderDashboard()

}

function renderAgenda(){

let html=`
<h2>Agenda</h2>

<input id="dataAgenda" type="date">
<input id="textoAgenda" placeholder="Anotação">

<button class="salvar" onclick="salvarAgenda()">Salvar</button>

<div id="listaAgenda"></div>
`

document.getElementById("agenda").innerHTML=html

let lista=""

agenda.forEach(a=>{

lista+=`
<div class="card">
<b>${a.data}</b><br>
${a.texto}
</div>
`

})

document.getElementById("listaAgenda").innerHTML=lista

}

function salvarAgenda(){

let a={
data:dataAgenda.value,
texto:textoAgenda.value
}

agenda.push(a)

localStorage.setItem("agenda",JSON.stringify(agenda))

renderAgenda()

}

function verificarNotificacao(){

let hoje=new Date().toISOString().split("T")[0]

vendas.forEach(v=>{

if(v.instalacao==hoje){

alert("Instalação hoje para "+v.cliente)

}

})

agenda.forEach(a=>{

if(a.data==hoje){

alert("Agenda: "+a.texto)

}

})

}

setInterval(verificarNotificacao,60000)

render()

</script>

</body>
</html>
